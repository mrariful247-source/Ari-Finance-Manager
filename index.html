<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0E1A">
<title>Ari Finance Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --ink:#0A0E1A; --surface:#121829; --surface-2:#1A2138; --line:rgba(230,184,76,.14);
  --line-soft:rgba(255,255,255,.07); --text:#EDF0F7; --muted:#8C97B4; --muted-2:#5A6688;
  --gold:#E6B84C; --gold-soft:rgba(230,184,76,.12);
  --green:#34D399; --green-soft:rgba(52,211,153,.12);
  --coral:#FB7185; --coral-soft:rgba(251,113,133,.12);
  --violet:#818CF8; --violet-soft:rgba(129,140,248,.12);
  --sky:#38BDF8; --glass:rgba(18,24,41,.72); --shadow:0 18px 50px -18px rgba(0,0,0,.7);
  --radius:20px; --radius-sm:14px;
}
[data-theme="light"]{
  --ink:#F5F3EC; --surface:#FFFFFF; --surface-2:#F0EEE4; --line:rgba(176,132,32,.22);
  --line-soft:rgba(20,24,40,.08); --text:#181C2A; --muted:#5C647C; --muted-2:#8C93A8;
  --gold:#B07C1A; --gold-soft:rgba(176,124,26,.1);
  --green:#0E9F6E; --green-soft:rgba(14,159,110,.1);
  --coral:#E11D48; --coral-soft:rgba(225,29,72,.1);
  --violet:#5B54D6; --violet-soft:rgba(91,84,214,.1);
  --sky:#0284C7; --glass:rgba(255,255,255,.82); --shadow:0 18px 50px -22px rgba(60,50,20,.28);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,sans-serif; background:var(--ink); color:var(--text);
  font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
  background-image:radial-gradient(1200px 600px at 88% -8%, rgba(230,184,76,.07), transparent 60%),
                   radial-gradient(1000px 500px at -6% 108%, rgba(129,140,248,.06), transparent 60%);
  background-attachment:fixed;
}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
h1,h2,h3,.disp{font-family:'Space Grotesk',sans-serif;letter-spacing:-.02em}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:20px;border:2px solid transparent;background-clip:padding-box}
::selection{background:var(--gold-soft)}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{
  width:250px;flex-shrink:0;background:var(--glass);backdrop-filter:blur(20px);
  border-right:1px solid var(--line-soft);padding:22px 14px;position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;gap:6px;overflow-y:auto;
}
.brand{display:flex;align-items:center;gap:11px;padding:6px 10px 20px}
.brand-mark{width:38px;height:38px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(140deg,var(--gold),#C79A2E);display:grid;place-items:center;
  box-shadow:0 8px 20px -6px rgba(230,184,76,.5)}
.brand-mark svg{width:20px;height:20px}
.brand-name{font-weight:700;font-size:16px;line-height:1.1}
.brand-sub{font-size:11px;color:var(--muted-2);letter-spacing:.04em;text-transform:uppercase}
.nav-group-label{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);
  padding:14px 12px 6px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;
  cursor:pointer;color:var(--muted);font-weight:500;font-size:14px;transition:.15s;border:1px solid transparent;position:relative}
.nav-item svg{width:19px;height:19px;flex-shrink:0}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--gold-soft);color:var(--gold);border-color:var(--line)}
.nav-item .badge{margin-left:auto;background:var(--coral);color:#fff;font-size:10px;font-weight:700;
  min-width:18px;height:18px;border-radius:9px;display:grid;place-items:center;padding:0 5px}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;background:var(--glass);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--line-soft);padding:14px 26px;display:flex;align-items:center;gap:16px}
.topbar h1{font-size:20px;font-weight:600}
.topbar .sub{font-size:12.5px;color:var(--muted);margin-top:1px}
.top-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
.hamburger{display:none;background:var(--surface-2);border:1px solid var(--line-soft);
  width:40px;height:40px;border-radius:11px;cursor:pointer;place-items:center}
.hamburger svg{width:20px;height:20px}
.content{padding:26px;flex:1}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:12px;
  border:1px solid var(--line-soft);background:var(--surface-2);cursor:pointer;font-weight:600;
  font-size:13.5px;transition:.15s;white-space:nowrap}
.btn svg{width:16px;height:16px}
.btn:hover{border-color:var(--line);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-gold{background:linear-gradient(140deg,var(--gold),#C79A2E);color:#1A1206;border:none;
  box-shadow:0 8px 18px -8px rgba(230,184,76,.55)}
.btn-gold:hover{filter:brightness(1.05)}
.btn-ghost{background:transparent}
.btn-icon{padding:10px;width:40px;height:40px;justify-content:center}
.btn-sm{padding:7px 11px;font-size:12.5px}
.btn-danger{color:var(--coral);border-color:var(--coral-soft)}
.btn-danger:hover{background:var(--coral-soft)}

/* Cards */
.card{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--line-soft);
  border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.grid{display:grid;gap:16px}
.stat-grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}
.stat{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--line-soft);
  border-radius:var(--radius-sm);padding:17px 18px;position:relative;overflow:hidden;transition:.18s}
.stat:hover{border-color:var(--line);transform:translateY(-2px)}
.stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);opacity:.85}
.stat.g::before{background:var(--green)} .stat.c::before{background:var(--coral)}
.stat.v::before{background:var(--violet)} .stat.s::before{background:var(--sky)}
.stat-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.stat-label{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.01em}
.stat-ico{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:var(--gold-soft);color:var(--gold);flex-shrink:0}
.stat-ico svg{width:16px;height:16px}
.stat.g .stat-ico{background:var(--green-soft);color:var(--green)}
.stat.c .stat-ico{background:var(--coral-soft);color:var(--coral)}
.stat.v .stat-ico{background:var(--violet-soft);color:var(--violet)}
.stat.s .stat-ico{background:rgba(56,189,248,.12);color:var(--sky)}
.stat-val{font-size:24px;font-weight:600;margin-top:12px;line-height:1.1}
.stat-val .cur{font-size:13px;color:var(--muted);font-weight:500;margin-right:3px}
.stat-meta{font-size:11.5px;color:var(--muted-2);margin-top:5px}

.section-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.section-head h2{font-size:17px;font-weight:600}
.section-head .spacer{flex:1}
.pill{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--surface-2);
  color:var(--muted);font-weight:600;border:1px solid var(--line-soft)}
.pill.gold{background:var(--gold-soft);color:var(--gold);border-color:var(--line)}

/* Table */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--line-soft)}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:520px}
th{text-align:left;padding:12px 14px;font-size:11px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted-2);font-weight:600;background:var(--surface-2);position:sticky;top:0}
td{padding:12px 14px;border-top:1px solid var(--line-soft);vertical-align:middle}
tbody tr{transition:.12s}
tbody tr:hover{background:var(--surface-2)}
.num{text-align:right}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;
  padding:3px 9px;border-radius:8px;background:var(--surface-2);color:var(--muted)}
.tag.pos{background:var(--green-soft);color:var(--green)}
.tag.neg{background:var(--coral-soft);color:var(--coral)}
.tag.pend{background:rgba(230,184,76,.12);color:var(--gold)}
.tag.part{background:var(--violet-soft);color:var(--violet)}
.tag.done{background:var(--green-soft);color:var(--green)}
.row-actions{display:flex;gap:6px;justify-content:flex-end}
.mini-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line-soft);
  background:var(--surface-2);cursor:pointer;display:grid;place-items:center;transition:.13s}
.mini-btn svg{width:15px;height:15px}
.mini-btn:hover{border-color:var(--line)}
.mini-btn.del:hover{color:var(--coral);border-color:var(--coral-soft)}

.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty svg{width:44px;height:44px;opacity:.4;margin-bottom:12px}
.empty h3{font-size:16px;margin-bottom:5px;color:var(--text);font-weight:600}
.empty p{font-size:13px;max-width:340px;margin:0 auto 16px}

/* Modal */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(5,8,16,.62);backdrop-filter:blur(6px);
  display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  width:100%;max-width:520px;box-shadow:0 30px 80px -20px rgba(0,0,0,.7);animation:pop .22s ease}
.modal.wide{max-width:680px}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{padding:20px 22px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:12px}
.modal-head h3{font-size:17px;font-weight:600}
.modal-head .close{margin-left:auto;width:34px;height:34px;border-radius:10px;border:1px solid var(--line-soft);
  background:var(--surface-2);cursor:pointer;display:grid;place-items:center}
.modal-head .close svg{width:17px;height:17px}
.modal-body{padding:22px}
.modal-foot{padding:16px 22px;border-top:1px solid var(--line-soft);display:flex;gap:10px;justify-content:flex-end}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
.field label{font-size:12px;font-weight:600;color:var(--muted)}
.field label .req{color:var(--coral)}
input,select,textarea{width:100%;padding:11px 13px;border-radius:11px;border:1px solid var(--line-soft);
  background:var(--surface-2);transition:.15s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft)}
textarea{resize:vertical;min-height:70px}
input.mono,td.mono{font-family:'IBM Plex Mono',monospace}

/* toast */
.toasts{position:fixed;bottom:22px;right:22px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--green);
  padding:13px 18px;border-radius:12px;box-shadow:var(--shadow);font-size:13.5px;font-weight:500;
  animation:slideIn .25s ease;max-width:320px}
.toast.err{border-left-color:var(--coral)}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

/* charts */
.chart-box{position:relative;height:300px}
.chart-box.sm{height:230px}
.two-col{display:grid;grid-template-columns:2fr 1fr;gap:16px}
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filters input,.filters select{width:auto;min-width:130px}

/* lock screen */
.lock{position:fixed;inset:0;z-index:300;background:var(--ink);display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:20px}
.lock.show{display:flex}
.lock .brand-mark{width:64px;height:64px;border-radius:18px}
.lock .brand-mark svg{width:34px;height:34px}
.pin-dots{display:flex;gap:14px}
.pin-dot{width:15px;height:15px;border-radius:50%;border:2px solid var(--muted-2);transition:.15s}
.pin-dot.on{background:var(--gold);border-color:var(--gold)}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:280px}
.pin-key{width:72px;height:72px;border-radius:50%;border:1px solid var(--line-soft);background:var(--surface);
  font-size:24px;font-weight:500;cursor:pointer;transition:.13s;font-family:'IBM Plex Mono',monospace}
.pin-key:hover{border-color:var(--gold);background:var(--surface-2)}
.pin-key.blank{border:none;background:transparent;cursor:default}

.mobile-nav{display:none}
.wallet-inputs{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}

@media(max-width:920px){
  .two-col{grid-template-columns:1fr}
}
@media(max-width:760px){
  .sidebar{position:fixed;z-index:90;left:-280px;transition:left .25s ease;box-shadow:20px 0 60px rgba(0,0,0,.5)}
  .sidebar.open{left:0}
  .hamburger{display:grid}
  .content{padding:16px}
  .topbar{padding:12px 16px}
  .topbar h1{font-size:17px}
  .top-actions .btn span{display:none}
  .stat-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .form-grid{grid-template-columns:1fr}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:85;display:none}
  .scrim.show{display:block}
}
@media(max-width:480px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .stat-val{font-size:20px}
}
</style>
</head>
<body>

<div class="lock" id="lockScreen">
  <div class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#1A1206" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h12"/></svg></div>
  <div style="text-align:center"><div class="disp" style="font-size:22px;font-weight:700">Ari Finance Manager</div>
  <div style="color:var(--muted);font-size:13px;margin-top:4px" id="lockMsg">Enter your PIN to unlock</div></div>
  <div class="pin-dots" id="pinDots"></div>
  <div class="pinpad" id="pinpad"></div>
</div>

<div class="scrim" id="scrim" onclick="toggleNav(false)"></div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#1A1206" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
      <div><div class="brand-name">Ari Finance</div><div class="brand-sub">Manager</div></div>
    </div>
    <div id="navList"></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="hamburger" onclick="toggleNav(true)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
      <div><h1 id="pageTitle">Dashboard</h1><div class="sub" id="pageSub">Your complete financial overview</div></div>
      <div class="top-actions">
        <button class="btn btn-icon btn-ghost" onclick="toggleTheme()" title="Toggle theme" id="themeBtn"></button>
        <button class="btn btn-gold" onclick="quickAdd()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg><span>Add</span></button>
      </div>
    </div>
    <div class="content" id="view"></div>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="toasts" id="toasts"></div>

<script>
"use strict";
/* ============================== STATE ============================== */
const KEY='ariFinance_v1';
const DEFAULT={
  settings:{name:'Ariful',currency:'SAR',homeCurrency:'BDT',rate:31.0,theme:'dark',pinEnabled:false,pin:''},
  income:[],expense:[],remittance:[],loansGiven:[],loansTaken:[],banks:[],
  wallet:{cash:0,mobile:0,savings:0,emergency:0},
  budget:{amount:0}
};
let state=load();
let charts={};
let currentView='dashboard';

function load(){
  try{const r=JSON.parse(localStorage.getItem(KEY));if(r)return Object.assign(JSON.parse(JSON.stringify(DEFAULT)),r);}catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT));
}
function save(){localStorage.setItem(KEY,JSON.stringify(state));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function todayISO(){return new Date().toISOString().slice(0,10);}
function monthKey(d){return (d||todayISO()).slice(0,7);}
function curSym(c){return {SAR:'﷼',BDT:'৳',USD:'$',AED:'د.إ',EUR:'€',GBP:'£',INR:'₹'}[c]||c+' ';}
function fmt(n){n=Number(n)||0;return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function money(n,c){c=c||state.settings.currency;return '<span class="cur">'+curSym(c)+'</span>'+fmt(n);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function niceDate(d){if(!d)return'—';const x=new Date(d+'T00:00:00');return x.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}

/* ============================== COMPUTE ============================== */
function sum(arr,f){return arr.reduce((a,b)=>a+(Number(f(b))||0),0);}
function loanRemaining(l){return Math.max(0,(Number(l.amount)||0)-(Number(l.paid)||0));}
function computeLoanStatus(l){const rem=loanRemaining(l);if(rem<=0)return'Completed';if((Number(l.paid)||0)>0)return'Partially Paid';return'Pending';}
function bankTotal(){return sum(state.banks,b=>b.balance);}

function metrics(){
  const inc=sum(state.income,x=>x.amount);
  const exp=sum(state.expense,x=>x.amount);
  const sent=sum(state.remittance,x=>x.amount);
  const received=sum(state.loansGiven,l=>l.paid); // repayments received back
  const loanGiven=sum(state.loansGiven,l=>l.amount);
  const loanTaken=sum(state.loansTaken,l=>l.amount);
  const loanGivenOut=sum(state.loansGiven,l=>loanRemaining(l)); // asset owed to me
  const debt=sum(state.loansTaken,l=>loanRemaining(l)); // liability
  const w=state.wallet;
  const liquid=(Number(w.cash)||0)+(Number(w.mobile)||0)+(Number(w.savings)||0)+(Number(w.emergency)||0)+bankTotal();
  const netWorth=liquid+loanGivenOut-debt;
  const savings=inc-exp;
  const tm=monthKey();
  const monthInc=sum(state.income.filter(x=>monthKey(x.date)===tm),x=>x.amount);
  const monthExp=sum(state.expense.filter(x=>monthKey(x.date)===tm),x=>x.amount);
  const monthSent=sum(state.remittance.filter(x=>monthKey(x.date)===tm),x=>x.amount);
  const td=todayISO();
  const todayInc=sum(state.income.filter(x=>x.date===td),x=>x.amount);
  const todayExp=sum(state.expense.filter(x=>x.date===td),x=>x.amount);
  return {inc,exp,sent,received,loanGiven,loanTaken,loanGivenOut,debt,liquid,netWorth,savings,
    monthInc,monthExp,monthSent,monthSavings:monthInc-monthExp,todayInc,todayExp,
    bank:bankTotal(),cash:Number(w.cash)||0,
    pendingLoans:state.loansGiven.filter(l=>loanRemaining(l)>0).length,
    pendingDebts:state.loansTaken.filter(l=>loanRemaining(l)>0).length};
}

function notifications(){
  const list=[];const now=new Date();const soon=new Date(Date.now()+7*864e5);
  state.loansTaken.forEach(l=>{if(l.dueDate&&loanRemaining(l)>0){const d=new Date(l.dueDate+'T00:00:00');
    if(d<now)list.push({type:'overdue',t:'Debt overdue',d:`You owe ${esc(l.lender||'lender')} `+curSym(l.currency||state.settings.currency)+fmt(loanRemaining(l))+` — due ${niceDate(l.dueDate)}`});
    else if(d<=soon)list.push({type:'due',t:'Debt payment soon',d:`Pay ${esc(l.lender||'lender')} by ${niceDate(l.dueDate)}`});}});
  state.loansGiven.forEach(l=>{if(l.returnDate&&loanRemaining(l)>0){const d=new Date(l.returnDate+'T00:00:00');
    if(d<now)list.push({type:'overdue',t:'Loan return overdue',d:`${esc(l.person||'Borrower')} should have returned `+curSym(l.currency||state.settings.currency)+fmt(loanRemaining(l))});}});
  const m=metrics();
  if(state.budget.amount>0&&m.monthExp>state.budget.amount)
    list.push({type:'budget',t:'Budget exceeded',d:`This month's spending ${money(m.monthExp)} is over your budget ${money(state.budget.amount)}`});
  else if(state.budget.amount>0&&m.monthExp>state.budget.amount*.85)
    list.push({type:'budget',t:'Budget almost reached',d:`You've used `+Math.round(m.monthExp/state.budget.amount*100)+`% of this month's budget`});
  return list;
}

function closeModal(){document.getElementById('overlay').classList.remove('open');document.getElementById('overlay').innerHTML='';}

function openForm(type,item){
  const cfg=FORMS[type];const edit=!!item;item=item||{};
  const body=cfg.fields.map(f=>{
    let val=item[f.k]!=null?item[f.k]:(f.def?f.def():'');
    let inp;
    if(f.t==='select')inp=`<select id="f_${f.k}">${opts(f.o,val)}</select>`;
    else if(f.t==='textarea')inp=`<textarea id="f_${f.k}" placeholder="${f.ph||''}">${esc(val)}</textarea>`;
    else inp=`<input id="f_${f.k}" type="${f.t}" ${f.mono?'class="mono"':''} value="${esc(val)}" placeholder="${f.ph||''}" ${f.t==='number'?'step="0.01"':''}>`;
    return `<div class="field ${f.full?'full':''}"><label>${f.l} ${f.req?'<span class="req">*</span>':''}</label>${inp}</div>`;
  }).join('');
  showModal(`${edit?'Edit':'Add'} ${cfg.title}`, `<div class="form-grid">${body}</div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-gold" onclick="saveForm('${type}','${item.id||''}')">${svg(IC.save)} ${edit?'Update':'Save'}</button>`);
}
function saveForm(type,id){
  const cfg=FORMS[type];const obj={};let ok=true;
  cfg.fields.forEach(f=>{const e=document.getElementById('f_'+f.k);let v=e.value;
    if(f.t==='number')v=v===''?'':parseFloat(v);
    if(f.req&&(v===''||v==null)){e.style.borderColor='var(--coral)';ok=false;}else e.style.borderColor='';
    obj[f.k]=v;});
  if(!ok){toast('Please fill required fields','err');return;}
  const arr=state[cfg.arr];
  if(id){const i=arr.findIndex(x=>x.id===id);if(i>-1)arr[i]=Object.assign(arr[i],obj);}
  else{obj.id=uid();if(type==='loansGiven'||type==='loansTaken'){obj.paid=0;obj.repayments=[];}arr.unshift(obj);}
  save();closeModal();render();renderNav();toast((id?'Updated':'Added')+' successfully');
}
function delItem(arr,id){
  showConfirm('Delete this record?','This action cannot be undone.',()=>{
    state[arr]=state[arr].filter(x=>x.id!==id);save();render();renderNav();toast('Deleted');});
}

  document.getElementById('overlay').innerHTML=
    `<div class="modal ${wide?'wide':''}"><div class="modal-head"><h3>${title}</h3>
     <button class="close" onclick="closeModal()">${svg('<path d="M18 6 6 18M6 6l12 12"/>')}</button></div>
     <div class="modal-body">${body}</div><div class="modal-foot">${foot}</div></div>`;
  document.getElementById('overlay').classList.add('open');
}

  showModal(title,`<p style="color:var(--muted)">${msg}</p>`,

     <button class="btn btn-danger" onclick="window.__yes();closeModal()">Delete</button>`);
}

function recordPayment(type,id){

     <button class="btn btn-gold" onclick="savePayment('${type}','${id}')">${svg(IC.pay)} Save Payment</button>`);

function savePayment(type,id){

  l.paid=(Number(l.paid)||0)+amt;save();closeModal();render();renderNav();toast('Payment recorded');

function flatten(type){
  const arr=state[type];
  if(type==='loansGiven')return arr.map(l=>({Person:l.person,Phone:l.phone,Date:l.date,Amount:l.amount,Currency:l.currency,Reason:l.reason,'Return Date':l.returnDate,Paid:l.paid,Remaining:loanRemaining(l),Status:computeLoanStatus(l),Notes:l.notes}));
  if(type==='loansTaken')return arr.map(l=>({Lender:l.lender,Phone:l.phone,Date:l.date,Amount:l.amount,Currency:l.currency,'Interest %':l.interest,'Due Date':l.dueDate,Paid:l.paid,Remaining:loanRemaining(l),Status:computeLoanStatus(l),Notes:l.notes}));
  if(type==='remittance')return arr.map(x=>({Date:x.date,Amount:x.amount,Currency:x.currency,Rate:x.rate,'Received BDT':(Number(x.amount)||0)*(Number(x.rate)||0),Receiver:x.receiver,Relation:x.relation,Channel:x.channel,'Txn ID':x.txnId,Purpose:x.purpose,Notes:x.notes}));
  if(type==='income')return arr.map(x=>({Date:x.date,Amount:x.amount,Currency:x.currency,Source:x.source,Category:x.category,Notes:x.notes}));
  if(type==='expense')return arr.map(x=>({Date:x.date,Amount:x.amount,Category:x.category,Method:x.method,Notes:x.notes}));
  return arr;
}
function download(content,name,mime){const b=new Blob([content],{type:mime});const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
function exportCSV(type){const rows=flatten(type);if(!rows.length){toast('Nothing to export','err');return;}
  const heads=Object.keys(rows[0]);
  const csv=[heads.join(',')].concat(rows.map(r=>heads.map(h=>`"${String(r[h]==null?'':r[h]).replace(/"/g,'""')}"`).join(','))).join('\n');
  download(csv,`ari-${type}-${todayISO()}.csv`,'text/csv');toast('CSV exported');}
function exportExcel(type){const rows=flatten(type);if(!rows.length){toast('Nothing to export','err');return;}
  const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,type.slice(0,28));XLSX.writeFile(wb,`ari-${type}-${todayISO()}.xlsx`);toast('Excel exported');}
function exportAllExcel(){const wb=XLSX.utils.book_new();
  ['income','expense','remittance','loansGiven','loansTaken'].forEach(t=>{const r=flatten(t);
    if(r.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(r),t.slice(0,28));});
  if(!wb.SheetNames.length){toast('No data to export','err');return;}
  XLSX.writeFile(wb,`ari-finance-full-${todayISO()}.xlsx`);toast('Full Excel exported');}
function exportPDF(type,title){const rows=flatten(type);if(!rows.length){toast('Nothing to export','err');return;}
  const {jsPDF}=window.jspdf;const doc=new jsPDF();const heads=Object.keys(rows[0]);
  doc.setFontSize(15);doc.text(title||type,14,16);
  doc.setFontSize(9);doc.setTextColor(120);doc.text('Ari Finance Manager · '+niceDate(todayISO()),14,22);
  doc.autoTable({startY:27,head:[heads],body:rows.map(r=>heads.map(h=>String(r[h]==null?'':r[h]))),
    styles:{fontSize:8},headStyles:{fillColor:[230,184,76],textColor:[26,18,6]},theme:'striped'});
  doc.save(`ari-${type}-${todayISO()}.pdf`);toast('PDF exported');}
function exportSummaryPDF(){const m=metrics();const {jsPDF}=window.jspdf;const doc=new jsPDF();
  doc.setFontSize(18);doc.text('Financial Summary',14,18);
  doc.setFontSize(9);doc.setTextColor(120);doc.text(state.settings.name+' · '+niceDate(todayISO()),14,25);
  const c=state.settings.currency;
  const rows=[['Total Income',c+' '+fmt(m.inc)],['Total Expense',c+' '+fmt(m.exp)],['Net Savings',c+' '+fmt(m.savings)],
    ['Total Sent to Bangladesh',c+' '+fmt(m.sent)],['Loan Given',c+' '+fmt(m.loanGiven)],['Loan Taken',c+' '+fmt(m.loanTaken)],
    ['Outstanding (owed to you)',c+' '+fmt(m.loanGivenOut)],['Remaining Debt',c+' '+fmt(m.debt)],
    ['Cash & Bank',c+' '+fmt(m.liquid)],['Net Worth',c+' '+fmt(m.netWorth)]];
  doc.autoTable({startY:31,head:[['Metric','Amount']],body:rows,styles:{fontSize:10,cellPadding:3},
    headStyles:{fillColor:[230,184,76],textColor:[26,18,6]},columnStyles:{1:{halign:'right',font:'courier'}}});
  doc.save('ari-summary-'+todayISO()+'.pdf');toast('Summary PDF exported');}

/* ============================== BACKUP ============================== */
function renderBackup(v){
  const size=(new Blob([JSON.stringify(state)]).size/1024).toFixed(1);
  const count=state.income.length+state.expense.length+state.remittance.length+state.loansGiven.length+state.loansTaken.length+state.banks.length;
  v.innerHTML=`<div class="two-col">
    <div class="card"><div class="section-head"><h2>Backup Your Data</h2></div>
      <p style="color:var(--muted);font-size:13.5px;margin-bottom:16px">Your data is stored on this device only. Download a backup file regularly to keep it safe — you can restore it here or on another device.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-gold" onclick="backupJSON()">${svg(IC.save)} Download Backup (JSON)</button>
        <button class="btn" onclick="exportAllExcel()">${svg(IC.file)} Export as Excel</button></div>
      <div style="margin-top:18px;font-size:12.5px;color:var(--muted-2)">${count} records · ${size} KB stored locally</div></div>
    <div class="card"><div class="section-head"><h2>Restore</h2></div>
      <p style="color:var(--muted);font-size:13.5px;margin-bottom:16px">Import a previously saved JSON backup. This will replace all current data.</p>
      <input type="file" id="restoreFile" accept="application/json" style="margin-bottom:14px">
      <div><button class="btn" onclick="restoreJSON()">${svg(IC.backup)} Restore from File</button></div>
      <div style="margin-top:22px;border-top:1px solid var(--line-soft);padding-top:16px">
        <button class="btn btn-danger" onclick="wipeData()">${svg(IC.trash)} Erase All Data</button></div></div></div>`;
}
function backupJSON(){download(JSON.stringify(state,null,2),`ari-finance-backup-${todayISO()}.json`,'application/json');toast('Backup downloaded');}
function restoreJSON(){const f=document.getElementById('restoreFile').files[0];if(!f){toast('Choose a file first','err');return;}
  const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);
    state=Object.assign(JSON.parse(JSON.stringify(DEFAULT)),d);save();applyTheme();render();renderNav();toast('Data restored');}
    catch(err){toast('Invalid backup file','err');}};r.readAsText(f);}
function wipeData(){showConfirm('Erase everything?','All your financial records will be permanently deleted from this device.',()=>{
  state=JSON.parse(JSON.stringify(DEFAULT));save();render();renderNav();toast('All data erased');});}

/* ============================== SETTINGS ============================== */
function renderSettings(v){
  const s=state.settings;
  v.innerHTML=`<div class="two-col">
    <div class="card"><div class="section-head"><h2>Profile & Preferences</h2></div>
      <div class="form-grid">
        <div class="field full"><label>Your Name</label><input value="${esc(s.name)}" onchange="setSetting('name',this.value)"></div>
        <div class="field"><label>Base Currency</label><select onchange="setSetting('currency',this.value)">${opts(CURS,s.currency)}</select></div>
        <div class="field"><label>Home Currency</label><select onchange="setSetting('homeCurrency',this.value)">${opts(CURS,s.homeCurrency)}</select></div>
        <div class="field"><label>Default Exchange Rate (1 ${s.currency} → BDT)</label><input class="mono" type="number" step="0.01" value="${s.rate}" onchange="setSetting('rate',parseFloat(this.value)||0)"></div>
        <div class="field"><label>Theme</label><select onchange="setTheme(this.value)"><option value="dark" ${s.theme==='dark'?'selected':''}>Dark</option><option value="light" ${s.theme==='light'?'selected':''}>Light</option></select></div>
      </div>
      <p style="font-size:12px;color:var(--muted-2);margin-top:14px">Note: totals assume amounts are in your base currency. Remittance entries convert to BDT using the rate you enter per transaction.</p></div>
    <div class="card"><div class="section-head"><h2>Security · PIN Lock</h2></div>
      <p style="color:var(--muted);font-size:13.5px;margin-bottom:16px">Protect the app with a 4-digit PIN on this device.</p>
      ${s.pinEnabled?`<div class="tag done" style="margin-bottom:14px">PIN is ON</div>
        <div style="display:flex;gap:10px"><button class="btn" onclick="changePin()">Change PIN</button>
        <button class="btn btn-danger" onclick="disablePin()">Turn Off</button></div>`
       :`<button class="btn btn-gold" onclick="changePin()">${svg('<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>')} Set Up PIN</button>`}
      <div style="margin-top:22px;border-top:1px solid var(--line-soft);padding-top:16px;font-size:12.5px;color:var(--muted-2)">
        Ari Finance Manager · single-file offline app<br>Prepared by: Mohammad Ariful Islam</div></div></div>`;
}
function setSetting(k,val){state.settings[k]=val;save();if(k==='currency'||k==='rate')render();toast('Saved');}
function setTheme(t){state.settings.theme=t;save();applyTheme();if(currentView==='analytics')render();}
function toggleTheme(){setTheme(state.settings.theme==='dark'?'light':'dark');}
function applyTheme(){const t=state.settings.theme||'dark';document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').innerHTML=svg(t==='dark'?IC.sun:IC.moon);
  const mc=document.querySelector('meta[name=theme-color]');if(mc)mc.setAttribute('content',t==='dark'?'#0A0E1A':'#F5F3EC');}

/* ============================== PIN LOCK ============================== */
let pinBuffer='',pinMode='unlock',pinFirst='';
function changePin(){pinMode='setNew';pinFirst='';pinBuffer='';openLock('Enter a new 4-digit PIN');}
function disablePin(){state.settings.pinEnabled=false;state.settings.pin='';save();render();toast('PIN turned off');}
function openLock(msg){document.getElementById('lockMsg').textContent=msg||'Enter your PIN to unlock';
  document.getElementById('lockScreen').classList.add('show');renderPinDots();buildPinpad();}
function closeLock(){document.getElementById('lockScreen').classList.remove('show');pinBuffer='';}
function buildPinpad(){const p=document.getElementById('pinpad');
  p.innerHTML=[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>k===''?'<div class="pin-key blank"></div>':
    `<button class="pin-key" onclick="pinPress('${k}')">${k}</button>`).join('');}
function renderPinDots(){document.getElementById('pinDots').innerHTML=[0,1,2,3].map(i=>`<div class="pin-dot ${i<pinBuffer.length?'on':''}"></div>`).join('');}
function pinPress(k){
  if(k==='⌫'){pinBuffer=pinBuffer.slice(0,-1);renderPinDots();return;}
  if(pinBuffer.length>=4)return;pinBuffer+=k;renderPinDots();
  if(pinBuffer.length===4)setTimeout(handlePin,150);
}
function handlePin(){
  if(pinMode==='unlock'){
    if(pinBuffer===state.settings.pin){closeLock();}
    else{document.getElementById('lockMsg').textContent='Wrong PIN, try again';pinBuffer='';renderPinDots();}
  }else if(pinMode==='setNew'){
    pinFirst=pinBuffer;pinBuffer='';pinMode='confirm';renderPinDots();
    document.getElementById('lockMsg').textContent='Confirm your new PIN';
  }else if(pinMode==='confirm'){
    if(pinBuffer===pinFirst){state.settings.pin=pinFirst;state.settings.pinEnabled=true;save();
      pinMode='unlock';closeLock();render();toast('PIN set successfully');}
    else{document.getElementById('lockMsg').textContent="PINs didn't match. Start again.";
      pinMode='setNew';pinFirst='';pinBuffer='';renderPinDots();}
  }
}

/* ============================== INIT ============================== */
function init(){
  applyTheme();renderNav();render();
  if(state.settings.pinEnabled&&state.settings.pin){pinMode='unlock';openLock();}
}
init();
</script>
