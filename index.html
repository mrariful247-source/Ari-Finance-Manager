<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>My Life Finance &amp; Business Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --paper:#F6F5F1; --surface:#FFFFFF; --surface-2:#FBFAF7; --line:#E7E4DC; --line-2:#EFEDE7;
  --ink:#17201C; --muted:#6B7069; --faint:#9A9E97;
  --brand:#0E7A6B; --brand-2:#0A6155; --brand-soft:#E2F1ED; --gold:#B4832B; --gold-soft:#F6ECD8;
  --income:#1F9D57; --income-bg:#E6F5EC; --expense:#D64545; --expense-bg:#FBE9E9;
  --transfer:#2B6CB0; --transfer-bg:#E7F0FA; --pending:#D98613; --pending-bg:#FBEFDB;
  --loan:#7A4FC0; --loan-bg:#F0E9FB; --business:#0E7A6B; --business-bg:#E2F1ED;
  --overdue:#9B1C1C; --overdue-bg:#F8E1E1; --profit:#1F9D57; --loss:#D64545;
  --shadow:0 1px 2px rgba(20,30,25,.05),0 8px 24px -12px rgba(20,30,25,.14);
  --radius:14px; --radius-sm:10px;
  --font:'Hind Siliguri',system-ui,sans-serif; --mono:'JetBrains Mono',monospace; --display:'Sora','Hind Siliguri',sans-serif;
}
[data-theme="dark"]{
  --paper:#0E1512; --surface:#151E1A; --surface-2:#1A2521; --line:#26332D; --line-2:#202B26;
  --ink:#ECEFEC; --muted:#9AA69F; --faint:#6C7A73;
  --brand:#2AA793; --brand-2:#1F8B79; --brand-soft:#12332C; --gold:#D6A94E; --gold-soft:#2A2213;
  --income:#3BC77A; --income-bg:#12301F; --expense:#F06767; --expense-bg:#3A1717;
  --transfer:#5A9BE0; --transfer-bg:#152A3E; --pending:#E5A33B; --pending-bg:#33260F;
  --loan:#A282E0; --loan-bg:#241a3a; --business:#2AA793; --business-bg:#12332C;
  --overdue:#F06767; --overdue-bg:#3A1717; --profit:#3BC77A; --loss:#F06767;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px -14px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--paper);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
h1,h2,h3,h4{font-family:var(--display);font-weight:700;line-height:1.2;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--surface);color:var(--ink);transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
label{font-size:12.5px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px}
a{color:var(--brand);text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:20px;border:2px solid var(--paper)}

/* ---------- Layout shell ---------- */
.app{display:flex;min-height:100vh}
.sidebar{width:248px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:20px 20px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--line-2)}
.brand .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(145deg,var(--brand),var(--brand-2));display:grid;place-items:center;color:#fff;font-family:var(--display);font-weight:800;font-size:18px;box-shadow:0 4px 12px -3px rgba(14,122,107,.5)}
.brand .bt{font-family:var(--display);font-weight:800;font-size:15px;letter-spacing:-.02em}
.brand .bs{font-size:11px;color:var(--faint);font-weight:500}
.nav{flex:1;overflow-y:auto;padding:12px 12px 20px}
.nav-group{font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);padding:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:var(--muted);font-weight:600;font-size:14px;cursor:pointer;transition:.13s;margin-bottom:1px}
.nav-item svg{width:18px;height:18px;flex-shrink:0;stroke-width:2}
.nav-item:hover{background:var(--surface-2);color:var(--ink)}
.nav-item.active{background:var(--brand-soft);color:var(--brand-2)}
[data-theme="dark"] .nav-item.active{color:var(--brand)}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--paper) 85%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:13px 26px;display:flex;align-items:center;gap:14px}
.topbar .pagetitle{font-family:var(--display);font-weight:700;font-size:19px;flex:1}
.topbar .pagesub{font-size:12.5px;color:var(--faint);font-weight:500;margin-top:1px}
.content{padding:26px;flex:1;max-width:1240px;width:100%;margin:0 auto}
.hamburger{display:none}

/* controls */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 15px;border-radius:10px;font-weight:600;font-size:13.5px;background:var(--surface);border:1px solid var(--line);color:var(--ink);transition:.14s;white-space:nowrap}
.btn:hover{border-color:var(--brand);color:var(--brand-2)}
.btn svg{width:16px;height:16px;stroke-width:2}
.btn-primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn-primary:hover{background:var(--brand-2);border-color:var(--brand-2);color:#fff}
.btn-ghost{background:transparent;border-color:transparent}
.btn-ghost:hover{background:var(--surface-2)}
.btn-danger{color:var(--expense);border-color:var(--line)}
.btn-danger:hover{background:var(--expense-bg);border-color:var(--expense)}
.btn-sm{padding:6px 10px;font-size:12.5px}
.btn-icon{width:36px;height:36px;padding:0;border-radius:9px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.lang-toggle{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.lang-toggle button{padding:6px 11px;font-size:12.5px;font-weight:600;color:var(--muted)}
.lang-toggle button.on{background:var(--brand);color:#fff}

/* cards */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-pad{padding:18px}
.grid{display:grid;gap:16px}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.section-head h2{font-size:17px}

/* stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.stat .lbl{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
.stat .val{font-family:var(--mono);font-size:23px;font-weight:700;letter-spacing:-.02em;margin-top:7px}
.stat .sub{font-size:11.5px;color:var(--faint);margin-top:3px}
.stat .bar{position:absolute;left:0;top:0;bottom:0;width:4px}
.stat.pos .val{color:var(--income)} .stat.neg .val{color:var(--expense)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}

/* tables */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--line);background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{text-align:left;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);padding:12px 14px;border-bottom:1px solid var(--line);background:var(--surface-2);white-space:nowrap;position:sticky;top:0}
tbody td{padding:11px 14px;border-bottom:1px solid var(--line-2);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface-2)}
td.r,th.r{text-align:right}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.pos{color:var(--income)} .neg{color:var(--expense)}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;background:var(--surface-2);color:var(--muted)}
.st{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.act-btns{display:flex;gap:4px}
.act-btns button{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;color:var(--muted);border:1px solid transparent}
.act-btns button:hover{background:var(--surface-2);color:var(--ink);border-color:var(--line)}
.act-btns svg{width:15px;height:15px;stroke-width:1.9}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(15,22,18,.5);backdrop-filter:blur(3px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:18px;box-shadow:0 24px 60px -20px rgba(0,0,0,.4);width:100%;max-width:640px;margin:auto;animation:pop .2s ease}
.modal.wide{max-width:900px}
@keyframes pop{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);border-radius:18px 18px 0 0;z-index:2}
.modal-head h3{font-size:17px}
.modal-body{padding:22px}
.modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--surface);border-radius:0 0 18px 18px}
.close-x{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--muted)}
.close-x:hover{background:var(--surface-2);color:var(--ink)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
.field{margin-bottom:2px}
.calc-box{background:var(--brand-soft);border:1px dashed var(--brand);border-radius:12px;padding:14px;margin-top:6px}
.calc-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
.calc-row.total{font-weight:700;border-top:1px solid var(--brand);margin-top:5px;padding-top:7px;font-size:15px}
[data-theme="dark"] .calc-box{background:var(--brand-soft)}

/* toolbar/filters */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.search{position:relative;flex:1;min-width:200px}
.search input{padding-left:38px}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--faint)}
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;padding:14px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;margin-bottom:16px}
.filter-bar>div{min-width:140px;flex:1}

/* quick actions */
.qa-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px}
.qa{display:flex;flex-direction:column;gap:9px;padding:15px;border:1px solid var(--line);border-radius:13px;background:var(--surface);text-align:left;transition:.14s}
.qa:hover{border-color:var(--brand);transform:translateY(-2px);box-shadow:var(--shadow)}
.qa .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center}
.qa .ic svg{width:20px;height:20px;stroke-width:2}
.qa .t{font-weight:600;font-size:13.5px;line-height:1.25}

.chart-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.chart-card h4{font-size:14px;margin-bottom:14px;color:var(--ink)}
.chart-box{position:relative;height:250px}

.empty{text-align:center;padding:48px 20px;color:var(--faint)}
.empty svg{width:44px;height:44px;margin-bottom:12px;opacity:.5}
.empty p{font-weight:500}

.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--ink);color:var(--paper);padding:13px 18px;border-radius:11px;font-size:13.5px;font-weight:500;box-shadow:0 12px 30px -8px rgba(0,0,0,.4);display:flex;align-items:center;gap:10px;animation:slidein .25s ease;max-width:340px}
.toast.ok{background:var(--brand-2)}.toast.err{background:var(--expense)}.toast.warn{background:var(--pending)}
@keyframes slidein{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}

.banner{display:flex;gap:11px;align-items:flex-start;padding:13px 16px;border-radius:12px;font-size:13px;margin-bottom:16px}
.banner svg{width:19px;height:19px;flex-shrink:0;margin-top:1px}
.banner.info{background:var(--transfer-bg);color:var(--transfer)}
.banner.warn{background:var(--pending-bg);color:var(--pending)}

.subnav{display:flex;gap:4px;margin-bottom:18px;border-bottom:1px solid var(--line);overflow-x:auto}
.subnav button{padding:9px 15px;font-weight:600;font-size:13.5px;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap}
.subnav button.on{color:var(--brand-2);border-bottom-color:var(--brand)}
[data-theme="dark"] .subnav button.on{color:var(--brand)}

.list-row{display:flex;align-items:center;gap:13px;padding:13px 15px;border:1px solid var(--line);border-radius:12px;background:var(--surface);margin-bottom:9px;transition:.13s}
.list-row:hover{border-color:var(--brand)}
.list-row .av{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-weight:700;flex-shrink:0;font-family:var(--display)}
.list-row .g{flex:1;min-width:0}
.list-row .nm{font-weight:600;font-size:14px}
.list-row .mt{font-size:12px;color:var(--faint)}

.hidden{display:none!important}
.progress{height:6px;background:var(--line-2);border-radius:20px;overflow:hidden;margin-top:6px}
.progress>div{height:100%;background:var(--brand);border-radius:20px;transition:width .4s}

/* bottom nav mobile */
.bottomnav{display:none}

@media(max-width:920px){
  .sidebar{position:fixed;left:0;top:0;z-index:90;transform:translateX(-100%);transition:transform .25s;box-shadow:0 0 40px rgba(0,0,0,.2)}
  .sidebar.open{transform:none}
  .sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:80}
  .sb-overlay.open{display:block}
  .hamburger{display:grid}
  .content{padding:18px 15px 90px}
  .topbar{padding:12px 15px}
  .form-grid{grid-template-columns:1fr}
  .bottomnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:70;background:var(--surface);border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
  .bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;color:var(--muted);font-size:10px;font-weight:600}
  .bottomnav button svg{width:21px;height:21px;stroke-width:2}
  .bottomnav button.active{color:var(--brand)}
  .modal-bg{padding:0;align-items:flex-end}
  .modal{max-width:100%;border-radius:20px 20px 0 0;margin:0}
  .modal-head{border-radius:20px 20px 0 0}
}
@media print{
  .sidebar,.topbar,.bottomnav,.toolbar,.filter-bar,.act-btns,.no-print{display:none!important}
  .content{padding:0;max-width:100%}
  body{background:#fff}
  .card,.stat,.tbl-wrap{box-shadow:none;border-color:#ccc}
}
</style>
</head>
<body data-theme="light">

<div class="app">
  <div class="sb-overlay" id="sbOverlay" onclick="toggleSidebar(false)"></div>
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">M</div>
      <div>
        <div class="bt">Life Finance</div>
        <div class="bs" data-i18n="app_sub">ও ব্যবসা ম্যানেজার</div>
      </div>
    </div>
    <nav class="nav" id="navMenu"></nav>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="btn btn-icon hamburger" onclick="toggleSidebar(true)" aria-label="menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div>
        <div class="pagetitle" id="pageTitle">Dashboard</div>
        <div class="pagesub" id="pageSub"></div>
      </div>
      <div class="lang-toggle">
        <button id="langBn" onclick="setLang('bn')">বাংলা</button>
        <button id="langEn" onclick="setLang('en')">EN</button>
      </div>
      <button class="btn btn-icon" onclick="toggleTheme()" aria-label="theme" id="themeBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
    </div>
    <main class="content" id="content"></main>
  </div>
</div>

<nav class="bottomnav" id="bottomNav"></nav>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="toast-wrap" id="toastWrap"></div>

<script>
/* ============================================================
   My Life Finance & Business Manager
   Vanilla JS · IndexedDB · Bilingual · Single file
   ============================================================ */
'use strict';

/* ---------- Constants ---------- */
const DB_NAME = 'lifeFinanceDB';
const DB_VER = 1;
const STORES = ['settings','accounts','currencies','exchangeRates','transactions',
  'incomeCategories','expenseCategories','personalRemittances','contacts','personalLoans',
  'loanPayments','customers','businessDeals','businessCollections','businessExpenses',
  'attachments','monthlyClosings','auditLogs','backupSnapshots'];

const LEDGER_TYPES = ['Personal','Personal Remittance','Personal Loan','Business','Business Loan','Internal Transfer','Adjustment'];
const TXN_STATUS = ['Draft','Pending','Processing','Completed','Sent','Received','Failed','Cancelled'];
const CURRENCIES = [
  {code:'SAR',name:'Saudi Riyal',symbol:'﷼',dp:2},
  {code:'BDT',name:'Bangladeshi Taka',symbol:'৳',dp:2},
  {code:'USD',name:'US Dollar',symbol:'$',dp:2},
  {code:'AED',name:'UAE Dirham',symbol:'د.إ',dp:2},
  {code:'EUR',name:'Euro',symbol:'€',dp:2},
  {code:'GBP',name:'Pound',symbol:'£',dp:2},
  {code:'KWD',name:'Kuwaiti Dinar',symbol:'د.ك',dp:3},

  {code:'BHD',name:'Bahraini Dinar',symbol:'.د.ب',dp:3},
  {code:'MYR',name:'Ringgit',symbol:'RM',dp:2}
];
const ACCOUNT_TYPES = ['Cash','Saudi Bank','Bangladesh Bank','Mobile Wallet','Salary Account','Savings Account','Business Cash','Business Bank','Customer Receivable','Loan Account','Foreign Currency Account','Other'];
const INCOME_SOURCES = ['Salary','Overtime','Bonus','Allowance','Freelancing','Business Profit','Commission','Gift','Refund','Investment','Other'];
const DEFAULT_INCOME_CATS = ['Salary','Overtime','Bonus','Allowance','Freelancing','Business Profit','Commission','Gift','Refund','Investment','Other'];
const DEFAULT_EXPENSE_CATS = ['Food','House Rent','Grocery','Transport','Mobile','Internet','Electricity','Water','Medical','Education','Clothing','Family Support','Entertainment','Subscription','Travel','Personal Loan Payment','Bank Charge','Charity','Shopping','Business Investment','Other'];
const PAYMENT_METHODS = ['Cash','Bank Transfer','Card','Mobile Wallet','Cheque','Exchange House','Online','Other'];

/* ---------- i18n ---------- */
const I18N = {
  bn:{
    app_sub:'ও ব্যবসা ম্যানেজার',
    nav_main:'প্রধান', nav_money:'অর্থব্যবস্থা', nav_business:'ব্যবসা', nav_system:'সিস্টেম',
    dashboard:'ড্যাশবোর্ড', personal:'ব্যক্তিগত হিসাব', remittance:'রেমিট্যান্স', loans:'ঋণ',
    business:'কাস্টমার ব্যবসা', customers:'কাস্টমার', accounts:'অ্যাকাউন্ট', transactions:'লেনদেন',

let LANG = 'bn';
function t(k){ return (I18N[LANG] && I18N[LANG][k]) || (I18N.bn[k]) || k; }

/* ---------- IndexedDB layer ---------- */
let _db = null;
function openDB(){
  return new Promise((res,rej)=>{
    const rq = indexedDB.open(DB_NAME, DB_VER);
    rq.onupgradeneeded = e=>{
      const db = e.target.result;
      STORES.forEach(s=>{ if(!db.objectStoreNames.contains(s)) db.createObjectStore(s,{keyPath:'id'}); });
    };
    rq.onsuccess = e=>{ _db = e.target.result; res(_db); };
    rq.onerror = e=>rej(e.target.error);
  });
}
function tx(store, mode='readonly'){ return _db.transaction(store, mode).objectStore(store); }
function dbGetAll(store){
  return new Promise((res,rej)=>{ const r = tx(store).getAll(); r.onsuccess=()=>res(r.result||[]); r.onerror=()=>rej(r.error); });
}
function dbPut(store, obj){
  return new Promise((res,rej)=>{ const r = tx(store,'readwrite').put(obj); r.onsuccess=()=>res(obj); r.onerror=()=>rej(r.error); });
}
function dbDelete(store, id){
  return new Promise((res,rej)=>{ const r = tx(store,'readwrite').delete(id); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); });
}
function dbClear(store){
  return new Promise((res,rej)=>{ const r = tx(store,'readwrite').clear(); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); });
}

/* ---------- Utils ---------- */
function uid(p){ return (p||'id')+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function r2(x){ x=Number(x)||0; return Math.round((x+Number.EPSILON)*100)/100; }
function nowISO(){ return new Date().toISOString(); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function timeStr(){ return new Date().toTimeString().slice(0,5); }
function meta(){ return { createdAt:nowISO(), updatedAt:nowISO(), deletedAt:null, status:'active' }; }
function active(arr){ return (arr||[]).filter(x=>!x.deletedAt); }

function curSym(code){ const c = getCurrency(code); return c? c.symbol : code; }
function getCurrency(code){ return S.currencies.find(c=>c.code===code) || CURRENCIES.find(c=>c.code===code) || {code,symbol:code,dp:2}; }
function fmtNum(x,dp){ dp = dp==null?2:dp; return (Number(x)||0).toLocaleString('en-US',{minimumFractionDigits:dp,maximumFractionDigits:dp}); }
function money(x,code){ const c=getCurrency(code); return curSym(code)+' '+fmtNum(x,c.dp); }
function moneyPlain(x,code){ const c=getCurrency(code); return fmtNum(x,c.dp)+' '+code; }
function fmtDate(d){
  if(!d) return '—';
  const dt = new Date(d.length<=10? d+'T00:00:00' : d);
  const dd=String(dt.getDate()).padStart(2,'0'), mm=String(dt.getMonth()+1).padStart(2,'0'), yy=dt.getFullYear();
  const f = S.settings.dateFormat||'DD/MM/YYYY';
  if(f==='YYYY-MM-DD') return `${yy}-${mm}-${dd}`;
  if(f==='DD MMM YYYY'){ const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${dd} ${M[dt.getMonth()]} ${yy}`; }
  return `${dd}/${mm}/${yy}`;
}
function monthKey(d){ return (d||'').slice(0,7); }
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- Audit ---------- */
async function audit(recordType, recordId, action, prev, next){
  const log = { id:uid('log'), recordType, recordId, action,
    previousValue: prev? JSON.stringify(prev).slice(0,4000):null,
    newValue: next? JSON.stringify(next).slice(0,4000):null,
    actionDate: todayStr(), actionTime: timeStr(), createdAt:nowISO() };
  S.auditLogs.push(log); await dbPut('auditLogs', log);
}

/* ============================================================
   CALCULATION ENGINE
   ============================================================ */
// Postings: how each transaction moves money in/out of accounts.
function txnPostings(tr){
  const a = r2(tr.amount), fee = r2(tr.fee||0), other = r2(tr.other||0), out = [];
  const push=(acc,delta)=>{ if(acc) out.push({account:acc, delta:r2(delta)}); };
  switch(tr.type){
    case 'income': case 'loan_taken': case 'loan_repay_received':
    case 'business_collection': case 'capital_added':
      push(tr.toAccount, a); break;
    case 'expense': case 'business_expense':
      push(tr.fromAccount, -(a+fee)); break;
    case 'loan_given': case 'capital_withdrawn':
      push(tr.fromAccount, -a); break;
    case 'loan_repay_paid':
      push(tr.fromAccount, -(a+fee)); break;
    case 'transfer':
      push(tr.fromAccount, -(a+fee)); push(tr.toAccount, a); break;
    case 'remittance':
      push(tr.fromAccount, -(a+fee+other));
      if(tr.toAccount) push(tr.toAccount, r2(tr.finalBDT||0));
      break;
    case 'business_deal':
      push(tr.fromAccount, -a); break; // a = BDT given
    case 'adjustment':
      if(tr.adjDir==='out') push(tr.fromAccount,-a); else push(tr.toAccount,a); break;
  }
  return out;
}
function accountBalance(accId){
  const acc = S.accounts.find(x=>x.id===accId); if(!acc) return 0;
  let bal = r2(acc.openingBalance||0);
  active(S.transactions).forEach(tr=>{
    txnPostings(tr).forEach(p=>{ if(p.account===accId) bal = r2(bal + p.delta); });
  });
  return bal;
}
function accountsByCurrency(){
  const map = {};
  active(S.accounts).forEach(a=>{ if(a.active===false) return; map[a.currency]=(map[a.currency]||0)+accountBalance(a.id); });
  Object.keys(map).forEach(k=>map[k]=r2(map[k]));
  return map;
}
// Personal income / expense (exclude loans, business, transfers)
function personalIncome(txns){ return r2(active(txns||S.transactions).filter(x=>x.type==='income').reduce((s,x)=>s+r2(x.amount),0)); }
function personalExpense(txns){ return r2(active(txns||S.transactions).filter(x=>x.type==='expense').reduce((s,x)=>s+r2(x.amount)+r2(x.fee||0),0)); }

// Remittance calc
function calcRemittance(sent, rate, incPct, fee, other){
  const base = r2(sent*rate);
  const incentive = r2(base*(incPct||0)/100);
  const finalBDT = r2(base+incentive);
  const totalDeducted = r2(Number(sent)+r2(fee||0)+r2(other||0));
  return { base, incentive, finalBDT, totalDeducted };
}
// Loan totals
function loanTotals(loan){
  const principal = r2(loan.amount);
  let interest = 0;
  if(loan.interestType==='Fixed Amount') interest = r2(loan.interestAmount||0);
  else if(loan.interestType==='Percentage') interest = r2(principal*(loan.interestRate||0)/100);
  else if(loan.interestType==='Monthly Percentage'){ const m=loan.termMonths||1; interest = r2(principal*(loan.interestRate||0)/100*m); }
  else if(loan.interestType==='Yearly Percentage'){ const y=(loan.termMonths||12)/12; interest = r2(principal*(loan.interestRate||0)/100*y); }
  const total = r2(principal+interest);
  const paid = r2(active(S.loanPayments).filter(p=>p.loanId===loan.id).reduce((s,p)=>s+r2(p.amount),0));
  const remaining = r2(total-paid);
  return { principal, interest, total, paid, remaining };
}
// Business deal calc
function dealCalc(deal){
  const sar = r2(deal.sarAmount);
  const bdtGiven = r2(sar*deal.dealRate);
  const collected = r2(active(S.businessCollections).filter(c=>c.dealId===deal.id).reduce((s,c)=>s+r2(c.sarReceived),0));
  const outstanding = r2(sar-collected);
  const marketRate = deal.marketRate || S.settings.defaultMarketRate;
  const estGross = r2(sar*(marketRate-deal.dealRate));
  const costs = r2((deal.transferCost||0)+(deal.agentFee||0)+(deal.otherCost||0));
  const estNet = r2(estGross + r2(deal.serviceCharge||0) - costs);
  const collPct = sar>0 ? r2(collected/sar*100) : 0;
  const realizedGross = r2(estGross*collPct/100);
  const unrealized = r2(estGross-realizedGross);
  const outstandingMarketBDT = r2(outstanding*marketRate);
  return { sar, bdtGiven, collected, outstanding, marketRate, estGross, estNet, collPct, realizedGross, unrealized, outstandingMarketBDT, costs };
}
// customer aggregates
function customerAgg(custId){
  const deals = active(S.businessDeals).filter(d=>d.customerId===custId);
  let totalSAR=0,totalBDT=0,collected=0,outstanding=0,estProfit=0,realized=0,overdue=0;
  const today = todayStr();
  deals.forEach(d=>{ const c=dealCalc(d);
    totalSAR=r2(totalSAR+c.sar); totalBDT=r2(totalBDT+c.bdtGiven); collected=r2(collected+c.collected);
    outstanding=r2(outstanding+c.outstanding); estProfit=r2(estProfit+c.estGross); realized=r2(realized+c.realizedGross);
    if(c.outstanding>0 && d.dueDate && d.dueDate<today) overdue=r2(overdue+c.outstanding);
  });
  return { deals, totalSAR, totalBDT, collected, outstanding, estProfit, realized, unrealized:r2(estProfit-realized), overdue };
}

let _charts = [];

function statCard(lbl,val,color,sub,barColor){
  return `<div class="stat"><div class="bar" style="background:${barColor||color||'var(--brand)'}"></div>
    <div class="lbl">${lbl}</div><div class="val" style="${color?'color:'+color:''}">${val}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`;

function dashTotals(){
  const cur=monthKey(todayStr());
  const txns=active(S.transactions);
  const monthTxns=txns.filter(x=>monthKey(x.date)===cur);
  const inc=personalIncome(), exp=personalExpense();
  const mInc=personalIncome(monthTxns), mExp=personalExpense(monthTxns);
  // accounts by type
  let cash=0,bank=0,wallet=0;
  active(S.accounts).forEach(a=>{ const b=accountBalance(a.id); const pr=S.settings.primaryCurrency;
    const v = a.currency===pr? b : b/(getCurrency(a.currency).rateToPrimary||1);
    if(a.type==='Cash'||a.type==='Business Cash') cash+=v; else if(a.type==='Mobile Wallet') wallet+=v; else if(/Bank|Savings|Salary/.test(a.type)) bank+=v;
  });
  // loans
  let loanTakenOut=0,loanGivenOut=0;
  active(S.personalLoans).forEach(l=>{ const tt=loanTotals(l); if(l.loanType==='Loan Taken') loanTakenOut+=tt.remaining; else loanGivenOut+=tt.remaining; });
  // remittance
  let rSent=0,rBase=0,rInc=0,rFinal=0,rFee=0,rPending=0,rRateSum=0,rCount=0;
  active(S.personalRemittances).forEach(r=>{ rSent+=r.sentAmount; rBase+=r.baseBDT; rInc+=r.incentiveAmount; rFinal+=r.finalBDT; rFee+=(r.fee||0)+(r.other||0); rRateSum+=r.rate; rCount++; if(['Pending','Processing','Draft'].includes(r.status)) rPending+=r.sentAmount; });
  // business
  let bCapital=0,bBDT=0,bSAR=0,bColl=0,bOut=0,bEst=0,bReal=0,bMarket=0,bOverdue=0;
  const today=todayStr();
  active(S.businessDeals).forEach(d=>{ const c=dealCalc(d); bBDT+=c.bdtGiven; bSAR+=c.sar; bColl+=c.collected; bOut+=c.outstanding; bEst+=c.estGross; bReal+=c.realizedGross; bMarket+=c.outstandingMarketBDT; if(c.outstanding>0&&d.dueDate&&d.dueDate<today) bOverdue+=c.outstanding; });
  bCapital=bBDT;
  return {inc,exp,mInc,mExp,mSav:r2(mInc-mExp),cash:r2(cash),bank:r2(bank),wallet:r2(wallet),loanTakenOut:r2(loanTakenOut),loanGivenOut:r2(loanGivenOut),
    rSent:r2(rSent),rBase:r2(rBase),rInc:r2(rInc),rFinal:r2(rFinal),rFee:r2(rFee),rPending:r2(rPending),rAvg:rCount?r2(rRateSum/rCount):0,
    bCapital:r2(bCapital),bBDT:r2(bBDT),bSAR:r2(bSAR),bColl:r2(bColl),bOut:r2(bOut),bEst:r2(bEst),bReal:r2(bReal),bUnreal:r2(bEst-bReal),bMarket:r2(bMarket),bOverdue:r2(bOverdue)};
}

function qa(type,label,color,bg){ return `<button class="qa" onclick="openTxn('${type}')"><div class="ic" style="background:${bg};color:${color}">${svg('plus')}</div><div class="t">${t(label)}</div></button>`; }

function drawDashCharts(){
  killCharts();
  const grid = getComputedStyle(document.body).getPropertyValue('--line').trim();
  const ink = getComputedStyle(document.body).getPropertyValue('--muted').trim();
  Chart.defaults.color=ink; Chart.defaults.font.family="'Hind Siliguri',sans-serif"; Chart.defaults.borderColor=grid;
  // months
  const months=[]; const now=new Date();
  for(let i=5;i>=0;i--){ const dt=new Date(now.getFullYear(),now.getMonth()-i,1); months.push(dt.toISOString().slice(0,7)); }
  const mLbl=months.map(m=>{ const [y,mo]=m.split('-'); const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return M[+mo-1]+' '+y.slice(2); });
  const incArr=months.map(m=>personalIncome(active(S.transactions).filter(x=>monthKey(x.date)===m)));
  const expArr=months.map(m=>personalExpense(active(S.transactions).filter(x=>monthKey(x.date)===m)));
  const ie=document.getElementById('chIE'); if(ie) _charts.push(new Chart(ie,{type:'bar',data:{labels:mLbl,datasets:[
    {label:t('income'),data:incArr,backgroundColor:'#1F9D57',borderRadius:5},{label:t('expense'),data:expArr,backgroundColor:'#D64545',borderRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{beginAtZero:true}}}}));
  // expense by cat
  const catMap={}; active(S.transactions).filter(x=>x.type==='expense').forEach(x=>{ catMap[x.category||'Other']=(catMap[x.category||'Other']||0)+r2(x.amount); });
  const ce=document.getElementById('chExp');
  if(ce){ const labels=Object.keys(catMap), vals=Object.values(catMap);
    if(labels.length) _charts.push(new Chart(ce,{type:'doughnut',data:{labels,datasets:[{data:vals,backgroundColor:['#0E7A6B','#D64545','#2B6CB0','#B4832B','#7A4FC0','#1F9D57','#D98613','#9B1C1C','#0891b2','#db2777']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{boxWidth:12}}}}}));
    else ce.parentElement.innerHTML=`<div class="empty" style="padding:30px">${svg('empty')}<p>${t('no_data')}</p></div>`; }
  // profit
  let est=0,real=0; active(S.businessDeals).forEach(d=>{ const cc=dealCalc(d); est+=cc.estGross; real+=cc.realizedGross; });
  const cp=document.getElementById('chProfit'); if(cp) _charts.push(new Chart(cp,{type:'bar',data:{labels:[t('est_profit'),t('realized'),t('unrealized')],datasets:[{data:[r2(est),r2(real),r2(est-real)],backgroundColor:['#B4832B','#1F9D57','#7A4FC0'],borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}}));
  // remittance monthly
  const remArr=months.map(m=>r2(active(S.personalRemittances).filter(r=>monthKey(r.date)===m).reduce((s,r)=>s+r.finalBDT,0)));
  const cr=document.getElementById('chRem'); if(cr) _charts.push(new Chart(cr,{type:'line',data:{labels:mLbl,datasets:[{label:t('total_final'),data:remArr,borderColor:'#0E7A6B',backgroundColor:'rgba(14,122,107,.12)',fill:true,tension:.35,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}}));
}

function recalcDeal(){ const sar=numv('f_sar'),mr=numv('f_market'),dr=numv('f_deal');

function collDealPick(){ const id=val('f_deal'); const box=document.getElementById('collInfo'); if(!id){box.classList.add('hidden');return;}

/* ---------- persistence helpers ---------- */
function upsert(key, rec){ if(key==='settings'){ S.settings=rec; return; } const a=S[key]; const i=a.findIndex(x=>x.id===rec.id); if(i>=0)a[i]=rec; else a.push(rec); }
async function save(store, rec){ upsert(store, rec); await dbPut(store, rec); }
async function reloadRender(){ render(); if(CUR==='dashboard'){} }
function balWarn(accId, out){ if(!accId||out<=0) return false; return accountBalance(accId) < out - 0.001; }
function dupRef(ref, exceptId){ if(!ref) return false; return active(S.transactions).some(x=>x.reference&&x.reference===ref&&x.id!==exceptId); }

async function saveTxn(type, editId){
  const date=val('f_date')||todayStr();
  const isEdit=!!editId;
  const old = isEdit? S.transactions.find(x=>x.id===editId): null;
  const base = old? {...old} : { id:uid('tr'), ...meta() };
  base.date=date; base.time=old?old.time:timeStr(); base.type=type; base.updatedAt=nowISO();

  try{
    if(type==='income'){
      const amt=numv('f_amount'); if(amt<=0) return toast(LANG==='bn'?'পরিমাণ শূন্যের বেশি হতে হবে':'Amount must be > 0','err');
      Object.assign(base,{ledgerType:'Personal',amount:amt,currency:val('f_cur'),toAccount:val('f_to'),person:val('f_from2'),
        category:val('f_cat'),method:val('f_method'),reference:val('f_ref'),location:val('f_loc'),description:val('f_desc'),status:'Completed'});
      await save('transactions',base);
    }
    else if(type==='expense'||type==='business_expense'){
      const amt=numv('f_amount'); if(amt<=0) return toast(LANG==='bn'?'পরিমাণ শূন্যের বেশি হতে হবে':'Amount must be > 0','err');
      const from=val('f_from'); const fee=numv('f_fee');
      base.balanceWarning = balWarn(from, amt+fee);
      Object.assign(base,{ledgerType:type==='business_expense'?'Business':'Personal',amount:amt,fee,currency:val('f_cur'),fromAccount:from,person:val('f_to2'),
        category:val('f_cat'),method:val('f_method'),reference:val('f_ref'),location:val('f_loc'),description:val('f_desc'),status:'Completed'});
      await save('transactions',base);
      if(base.balanceWarning) toast(LANG==='bn'?'সতর্কতা: অ্যাকাউন্ট ব্যালেন্স কম':'Warning: low account balance','warn');
    }
    else if(type==='transfer'){
      const amt=numv('f_amount'); if(amt<=0) return toast(LANG==='bn'?'পরিমাণ শূন্যের বেশি হতে হবে':'Amount must be > 0','err');
      const from=val('f_from'),to=val('f_to'); if(from===to) return toast(LANG==='bn'?'একই অ্যাকাউন্ট নির্বাচন করা যাবে না':'From and To must differ','err');
      const fee=numv('f_fee'); base.balanceWarning=balWarn(from,amt+fee);
      Object.assign(base,{ledgerType:'Internal Transfer',amount:amt,fee,currency:val('f_cur'),fromAccount:from,toAccount:to,description:val('f_desc'),status:'Completed'});
      await save('transactions',base);
    }
    else if(type==='remittance'){
      const sent=numv('f_sent'),rate=numv('f_rate'); if(sent<=0) return toast(LANG==='bn'?'পরিমাণ শূন্যের বেশি হতে হবে':'Amount > 0','err');
      if(rate<=0) return toast(LANG==='bn'?'রেট শূন্য হতে পারবে না':'Rate cannot be 0','err');
      const c=calcRemittance(sent,rate,numv('f_inc'),numv('f_fee'),0);
      const remId = old? old.linkId : uid('rem');
      const rem={ id:remId, date, time:base.time, sender:val('f_sender'),receiverName:val('f_rcv'),receiverPhone:val('f_rcvph'),
        sentAmount:sent,rate,incentivePct:numv('f_inc'),baseBDT:c.base,incentiveAmount:c.incentive,finalBDT:c.finalBDT,
        fee:numv('f_fee'),other:0,totalDeducted:c.totalDeducted,fromAccount:val('f_from'),toAccount:val('f_to'),
        method:val('f_method'),status:val('f_status'),reference:val('f_ref'),note:val('f_desc'),txnId:base.id,...(old?{}:meta()) };
      base.balanceWarning=balWarn(val('f_from'),c.totalDeducted);
      Object.assign(base,{ledgerType:'Personal Remittance',amount:sent,fee:numv('f_fee'),other:0,currency:'SAR',
        fromAccount:val('f_from'),toAccount:val('f_to'),finalBDT:c.finalBDT,person:val('f_rcv'),reference:val('f_ref'),
        description:(LANG==='bn'?'রেমিট্যান্স → ':'Remittance → ')+val('f_rcv'),status:val('f_status'),linkId:remId});
      await save('personalRemittances',rem); await save('transactions',base);
    }
    else if(type==='loan_taken'||type==='loan_given'){
      const amt=numv('f_amount'); if(amt<=0) return toast(LANG==='bn'?'পরিমাণ শূন্যের বেশি':'Amount > 0','err');
      const loanId=old?old.linkId:uid('loan'); const acc=val('f_acc');
      const loan={ id:loanId,loanType:type==='loan_taken'?'Loan Taken':'Loan Given',personName:val('f_person'),phone:val('f_phone'),
        reason:val('f_desc'),date,dueDate:val('f_due'),amount:amt,currency:val('f_cur'),account:acc,interestType:val('f_itype'),
        interestRate:numv('f_irate'),interestAmount:numv('f_iamt'),termMonths:numv('f_term'),reference:val('f_ref'),
        status:'Active',txnId:base.id,...(old?{}:meta()) };
      if(type==='loan_given') base.balanceWarning=balWarn(acc,amt);
      Object.assign(base,{ledgerType:'Personal Loan',amount:amt,currency:val('f_cur'),
        toAccount:type==='loan_taken'?acc:null,fromAccount:type==='loan_given'?acc:null,
        person:val('f_person'),reference:val('f_ref'),description:(type==='loan_taken'?(LANG==='bn'?'ঋণ নেওয়া · ':'Loan taken · '):(LANG==='bn'?'ঋণ দেওয়া · ':'Loan given · '))+val('f_person'),status:'Completed',linkId:loanId});
      await save('personalLoans',loan); await save('transactions',base);
    }
    else if(type==='business_deal'){
      const sar=numv('f_sar'),dr=numv('f_deal'); if(sar<=0) return toast(LANG==='bn'?'SAR পরিমাণ প্রয়োজন':'SAR amount required','err');
      if(dr<=0) return toast(LANG==='bn'?'চুক্তি রেট প্রয়োজন':'Deal rate required','err');
      let custId=val('f_cust');
      if(!custId){ const nm=val('f_custname'); if(!nm) return toast(LANG==='bn'?'কাস্টমার নাম দিন':'Enter customer name','err');
        custId=uid('cust'); const cust={id:custId,name:nm,phone:val('f_custph'),customerType:'Business',openingBalance:0,active:true,...meta()};
        await save('customers',cust); }
      const dealId=old?old.linkId:uid('deal');
      const c=dealCalc({sarAmount:sar,marketRate:numv('f_market'),dealRate:dr,id:dealId});
      const deal={ id:dealId,date,customerId:custId,customerName:val('f_custname')||(S.customers.find(x=>x.id===custId)||{}).name,
        customerPhone:val('f_custph'),sarAmount:sar,marketRate:numv('f_market'),dealRate:dr,fromAccount:val('f_from'),
        receiverName:val('f_rcvname'),receiverPhone:val('f_rcvph'),duration:val('f_dur'),dueDate:val('f_due'),
        serviceCharge:numv('f_svc'),transferCost:numv('f_tcost'),agentFee:numv('f_agent'),otherCost:numv('f_ocost'),
        reference:val('f_ref'),note:val('f_desc'),status:'Active',txnId:base.id,...(old?{}:meta()) };
      base.balanceWarning=balWarn(val('f_from'),c.bdtGiven);
      Object.assign(base,{ledgerType:'Business',amount:c.bdtGiven,currency:S.settings.secondaryCurrency,fromAccount:val('f_from'),
        customerId:custId,person:deal.customerName,reference:val('f_ref'),description:(LANG==='bn'?'ব্যবসা Deal · ':'Business deal · ')+deal.customerName,status:'Completed',linkId:dealId});
      await save('businessDeals',deal); await save('transactions',base);
    }
    else if(type==='business_collection'){
      const dealId=val('f_deal'); if(!dealId) return toast(LANG==='bn'?'Deal নির্বাচন করুন':'Select a deal','err');
      const sar=numv('f_sar'); if(sar<=0) return toast(LANG==='bn'?'পরিমাণ প্রয়োজন':'Amount required','err');
      const deal=S.businessDeals.find(x=>x.id===dealId); const c=dealCalc(deal);
      if(sar > c.outstanding + (old?r2(old.amount):0) + 0.001) toast(LANG==='bn'?'সতর্কতা: বকেয়ার চেয়ে বেশি':'Warning: exceeds outstanding','warn');
      const collId=old?old.linkId:uid('coll');
      const coll={id:collId,dealId,customerId:deal.customerId,date,sarReceived:sar,toAccount:val('f_to'),method:val('f_method'),reference:val('f_ref'),note:val('f_desc'),txnId:base.id,...(old?{}:meta())};
      Object.assign(base,{ledgerType:'Business',amount:sar,currency:'SAR',toAccount:val('f_to'),customerId:deal.customerId,
        person:(S.customers.find(x=>x.id===deal.customerId)||{}).name||deal.customerName,reference:val('f_ref'),
        description:(LANG==='bn'?'ব্যবসা আদায় · ':'Business collection · ')+((S.customers.find(x=>x.id===deal.customerId)||{}).name||''),status:'Completed',linkId:collId});
      await save('businessCollections',coll); await save('transactions',base);
      await refreshDealStatus(dealId);
    }
    else if(type==='capital_added'||type==='capital_withdrawn'){
      const amt=numv('f_amount'); if(amt<=0) return toast('Amount > 0','err'); const acc=val('f_acc');
      if(type==='capital_withdrawn') base.balanceWarning=balWarn(acc,amt);
      Object.assign(base,{ledgerType:'Business',amount:amt,currency:val('f_cur'),
        toAccount:type==='capital_added'?acc:null,fromAccount:type==='capital_withdrawn'?acc:null,
        description:val('f_desc')||(type==='capital_added'?(LANG==='bn'?'মূলধন যোগ':'Capital added'):(LANG==='bn'?'মূলধন উত্তোলন':'Capital withdrawn')),status:'Completed'});
      await save('transactions',base);
    }
    else if(type==='loan_repay_paid'||type==='loan_repay_received'){
      const loanId=val('f_loan'); if(!loanId) return toast(LANG==='bn'?'ঋণ নির্বাচন করুন':'Select a loan','err');
      const amt=numv('f_amount'); if(amt<=0) return toast('Amount > 0','err');
      const loan=S.personalLoans.find(x=>x.id===loanId); const tt=loanTotals(loan);
      if(amt>tt.remaining+0.001) toast(LANG==='bn'?'সতর্কতা: অবশিষ্টের চেয়ে বেশি':'Warning: exceeds remaining','warn');
      const acc=val('f_acc'); const payId=old?old.linkId:uid('pay');
      const pay={id:payId,loanId,date,amount:amt,currency:loan.currency,account:acc,method:val('f_method'),reference:val('f_ref'),note:val('f_desc'),txnId:base.id,...(old?{}:meta())};
      if(type==='loan_repay_paid') base.balanceWarning=balWarn(acc,amt);
      Object.assign(base,{ledgerType:'Personal Loan',amount:amt,currency:loan.currency,
        toAccount:type==='loan_repay_received'?acc:null,fromAccount:type==='loan_repay_paid'?acc:null,
        person:loan.personName,reference:val('f_ref'),description:(LANG==='bn'?'ঋণ কিস্তি · ':'Loan payment · ')+loan.personName,status:'Completed',linkId:payId});
      await save('loanPayments',pay); await save('transactions',base);
      await refreshLoanStatus(loanId);
    }
    await audit('transaction',base.id,isEdit?'edit':'create',old,base);
    closeModal(); render();
    toast(t('saved'),'ok');
  }catch(err){ console.error(err); toast('Error: '+err.message,'err'); }
}
async function refreshDealStatus(dealId){ const d=S.businessDeals.find(x=>x.id===dealId); if(!d)return; const c=dealCalc(d);
  d.status = c.outstanding<=0.001?'Fully Collected':(c.collected>0?'Partially Collected':(d.dueDate&&d.dueDate<todayStr()?'Overdue':'Active')); await save('businessDeals',d); }
async function refreshLoanStatus(loanId){ const l=S.personalLoans.find(x=>x.id===loanId); if(!l)return; const tt=loanTotals(l);
  l.status = tt.remaining<=0.001?'Fully Paid':(tt.paid>0?'Partially Paid':(l.dueDate&&l.dueDate<todayStr()?'Overdue':'Active')); await save('personalLoans',l); }

/* delete / restore a transaction (and linked record) */
async function delTxn(id){
  const tr=S.transactions.find(x=>x.id===id); if(!tr)return;
  tr.deletedAt=nowISO(); await save('transactions',tr);
  if(tr.linkId){ ['personalRemittances','personalLoans','businessDeals','businessCollections','loanPayments'].forEach(async k=>{
    const rec=S[k].find(x=>x.id===tr.linkId); if(rec){ rec.deletedAt=nowISO(); await save(k,rec); if(k==='businessCollections')refreshDealStatus(rec.dealId); if(k==='loanPayments')refreshLoanStatus(rec.loanId);} }); }
  await audit('transaction',id,'delete',tr,null); render(); toast(t('deleted'),'ok');
}
async function restoreTxn(id){ const tr=S.transactions.find(x=>x.id===id); if(!tr)return; tr.deletedAt=null; await save('transactions',tr);
  if(tr.linkId){ ['personalRemittances','personalLoans','businessDeals','businessCollections','loanPayments'].forEach(async k=>{ const rec=S[k].find(x=>x.id===tr.linkId); if(rec){rec.deletedAt=null;await save(k,rec);} }); }
  render(); toast(t('restored'),'ok'); }

let _loanTab='all';
function renderLoans(c){
  setPage(t('loans'), t('nav_money'));

  let loans=active(S.personalLoans);
  const given=loans.filter(l=>l.loanType==='Loan Given'), taken=loans.filter(l=>l.loanType==='Loan Taken');
  const sumRem=arr=>r2(arr.reduce((s,l)=>s+loanTotals(l).remaining,0));
  const receivable=sumRem(given), payable=sumRem(taken);
  const tab=_loanTab; let show = tab==='given'?given: tab==='taken'?taken: loans;
  show=show.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  c.innerHTML = pageHead(t('loans'), null,
     `<button class="btn btn-ghost btn-sm" onclick="openTxn('loan_given')">${svg('plus')}${t('give')}</button>
      <button class="btn btn-primary btn-sm" onclick="openTxn('loan_taken')">${svg('plus')}${t('take')}</button>`)
   + `<div class="stat-grid" style="margin-bottom:18px">
        ${statCard(t('receivable'),money(receivable,pr),'var(--income)',t('loan_given'),'var(--loan)')}
        ${statCard(t('payable'),money(payable,pr),'var(--expense)',t('loan_taken'),'var(--expense)')}
      </div>
      <div class="subnav">
        <button class="${tab==='all'?'on':''}" onclick="_loanTab='all';render()">${t('all')}</button>
        <button class="${tab==='given'?'on':''}" onclick="_loanTab='given';render()">${t('loan_given')}</button>
        <button class="${tab==='taken'?'on':''}" onclick="_loanTab='taken';render()">${t('loan_taken')}</button>
      </div>`
   + (show.length? show.map(l=>{ const tt=loanTotals(l); const pct=tt.total>0?Math.min(100,r2(tt.paid/tt.total*100)):0;
       const dirColor=l.loanType==='Loan Given'?'var(--loan)':'var(--expense)';
       const dirBg=l.loanType==='Loan Given'?'var(--loan-bg)':'var(--expense-bg)';
       return `<div class="list-row" style="align-items:flex-start;cursor:pointer" onclick="loanDetail('${l.id}')">
         <div class="av" style="background:${dirBg};color:${dirColor}">${avatarText(l.personName)}</div>
         <div class="g">
           <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap">
             <div class="nm">${escapeHtml(l.personName||'—')} <span class="tag" style="margin-left:6px">${l.loanType==='Loan Given'?t('loan_given'):t('loan_taken')}</span></div>

/* ---------- generic linked-record delete ---------- */
async function delLinked(store,id){
  const rec=S[store].find(x=>x.id===id); if(!rec)return;
  rec.deletedAt=nowISO(); await save(store,rec);
  if(rec.txnId){ const tr=S.transactions.find(t=>t.id===rec.txnId); if(tr){tr.deletedAt=nowISO(); await save('transactions',tr);} }
  if(store==='businessCollections') await refreshDealStatus(rec.dealId);
  if(store==='loanPayments') await refreshLoanStatus(rec.loanId);
  await audit(store,id,'delete',rec,null); render(); toast(t('deleted'),'ok');
}

  capital_withdrawn:['capital','var(--pending)','var(--pending-bg)'], loan_repay_paid:['repay','var(--expense)','var(--expense-bg)'],

  if(f.from) rows=rows.filter(x=>(x.date||'')>=f.from);

  rows=rows.sort((a,b)=>(b.date||'').localeCompare(a.date||'')||(b.createdAt||'').localeCompare(a.createdAt||''));
  const typeOpt=[{v:'',l:t('all')}].concat(Object.keys(TXN_TYPE_META).map(k=>({v:k,l:txnTypeLabel(k)})));
  const ledgerOpt=[{v:'',l:t('all')}].concat(LEDGER_TYPES.map(x=>({v:x,l:x})));
  const accOpt=[{v:'',l:t('all_accounts')}].concat(active(S.accounts).map(a=>({v:a.id,l:a.name})));
  const trashCount=S.transactions.filter(x=>x.deletedAt).length;
  c.innerHTML = pageHead(t('transactions'), rows.length+' '+(LANG==='bn'?'টি লেনদেন':'entries'),
     `<button class="btn btn-ghost btn-sm" onclick="exportTxnsCSV()">${svg('download')}CSV</button>
      <button class="btn btn-ghost btn-sm" onclick="exportTxnsExcel()">${svg('download')}Excel</button>
      <button class="btn ${f.trash?'btn-primary':'btn-ghost'} btn-sm" onclick="_txnFilter.trash=!_txnFilter.trash;render()">${svg('trash')}${t('trash')}${trashCount?' ('+trashCount+')':''}</button>`)
   + `<div class="toolbar">
        <div class="search">${svg('search')}<input placeholder="${t('search')}..." value="${escapeHtml(f.q)}" oninput="_txnFilter.q=this.value;clearTimeout(window._tqto);window._tqto=setTimeout(render,220)"></div>

        <div><label style="font-size:11px;color:var(--muted)">${LANG==='bn'?'শেষ':'To'}</label><input type="date" value="${f.to}" onchange="_txnFilter.to=this.value;render()"></div>

      + rows.map(x=>{ const m=TXN_TYPE_META[x.type]||['','var(--muted)','var(--surface-2)'];
        const acc=S.accounts.find(a=>a.id===(x.fromAccount||x.toAccount)); const acc2=x.fromAccount&&x.toAccount?S.accounts.find(a=>a.id===x.toAccount):null;
        const outTypes=['expense','business_expense','transfer','loan_given','remittance','business_deal','capital_withdrawn','loan_repay_paid'];
        const sign = x.type==='transfer'?'':(outTypes.includes(x.type)?'−':'+');

        return `<tr>

          <td style="font-size:12px">${acc?escapeHtml(acc.name):'—'}${acc2?' → '+escapeHtml(acc2.name):''}</td>
          <td class="r mono ${col}">${sign} ${money(x.amount,x.currency)}</td>
          <td>${stBadge(x.status||'Completed')}</td>
          <td class="r">${f.trash
             ? `<div class="act-btns" style="justify-content:flex-end"><button title="${t('restore')}" onclick="restoreTxn('${x.id}')">${svg('restore')}</button></div>`
             : `<div class="act-btns" style="justify-content:flex-end">
                 <button title="${t('view')}" onclick="viewTxn('${x.id}')">${svg('eye')}</button>
                 <button title="${t('edit')}" onclick="editTxn('${x.id}')">${svg('edit')}</button>
                 <button title="${t('duplicate')}" onclick="dupTxn('${x.id}')">${svg('copy')}</button>
                 <button title="${t('delete')}" onclick="confirmDlg('${t('confirm_delete')}',()=>delTxn('${x.id}'),true)">${svg('trash')}</button></div>`}</td>
        </tr>`; }).join('')
      + `</tbody></table></div>`
     : emptyState(f.trash?(LANG==='bn'?'ট্র্যাশ খালি':'Trash is empty'):t('no_data')));
}

/* view / edit / duplicate / print a transaction */
function viewTxn(id){
  const x=S.transactions.find(t=>t.id===id); if(!x)return;
  const acc=S.accounts.find(a=>a.id===x.fromAccount), acc2=S.accounts.find(a=>a.id===x.toAccount);
  const rows=[[t('date'),fmtDate(x.date)],[t('type'),txnTypeLabel(x.type)],[LANG==='bn'?'খাত':'Ledger',x.ledgerType||'—'],
    [t('amount'),money(x.amount,x.currency)],[t('fee'),x.fee?money(x.fee,x.currency):'—'],
    [t('from_acc'),acc?acc.name:'—'],[t('to_acc'),acc2?acc2.name:'—'],[t('person'),x.person||'—'],
    [t('category'),x.category||'—'],[t('method'),x.method||'—'],[t('reference'),x.reference||'—'],
    [t('location'),x.location||'—'],[t('status'),x.status||'—'],[t('description'),x.description||x.note||'—']];
  openModal(`<div class="modal-head"><h3>${t('view')} — ${txnTypeLabel(x.type)}</h3><button class="close-x" onclick="closeModal()">✕</button></div>
    <div class="modal-body"><div id="printArea"><table style="width:100%"><tbody>${rows.map(([k,v])=>`<tr><td style="color:var(--muted);width:40%;padding:7px 6px;border-bottom:1px solid var(--line-2)">${k}</td><td style="font-weight:600;padding:7px 6px;border-bottom:1px solid var(--line-2)">${escapeHtml(String(v))}</td></tr>`).join('')}</tbody></table></div></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="printTxn('${x.id}')">${svg('print')}${t('print')}</button>
      <button class="btn btn-ghost" onclick="closeModal();editTxn('${x.id}')">${svg('edit')}${t('edit')}</button>
      <button class="btn btn-primary" onclick="closeModal()">${t('close')}</button></div>`);
}
function editableType(ty){ return ['income','expense','business_expense','transfer','capital_added','capital_withdrawn'].includes(ty); }
function editTxn(id){
  const x=S.transactions.find(t=>t.id===id); if(!x)return;
  if(editableType(x.type)){ openTxn(x.type, x); return; }
  // linked types -> build wrapper
  if(x.type==='remittance'){ const r=S.personalRemittances.find(y=>y.id===x.linkId); openTxn('remittance',{id:x.id,date:x.date,_rem:r||{}}); return; }
  if(x.type==='loan_taken'||x.type==='loan_given'){ const l=S.personalLoans.find(y=>y.id===x.linkId); openTxn(x.type,{id:x.id,date:x.date,_loan:l||{}}); return; }
  if(x.type==='business_deal'){ const d=S.businessDeals.find(y=>y.id===x.linkId); openTxn('business_deal',{id:x.id,date:x.date,_deal:d||{}}); return; }
  if(x.type==='business_collection'){ const co=S.businessCollections.find(y=>y.id===x.linkId); openTxn('business_collection',{id:x.id,date:x.date,dealId:co&&co.dealId,sarReceived:co&&co.sarReceived,toAccount:co&&co.toAccount,method:co&&co.method,reference:co&&co.reference,note:co&&co.note}); return; }
  if(x.type==='loan_repay_paid'||x.type==='loan_repay_received'){ const p=S.loanPayments.find(y=>y.id===x.linkId); openTxn(x.type,{id:x.id,date:x.date,loanId:p&&p.loanId,amount:p&&p.amount,account:p&&p.account,method:p&&p.method,reference:p&&p.reference,note:p&&p.note}); return; }
  viewTxn(id);
}
function dupTxn(id){
  const x=S.transactions.find(t=>t.id===id); if(!x)return;
  if(editableType(x.type)){ const cp={...x}; delete cp.id; cp.date=todayStr(); cp.reference=''; openTxn(x.type,cp); }
  else toast(LANG==='bn'?'এই ধরনের এন্ট্রি ডুপ্লিকেট করা যায় না':'This entry type cannot be duplicated','warn');
}
function printTxn(id){
  const x=S.transactions.find(t=>t.id===id); if(!x)return;
  const acc=S.accounts.find(a=>a.id===x.fromAccount), acc2=S.accounts.find(a=>a.id===x.toAccount);
  const biz=S.settings.businessName||'My Finance';
  const w=window.open('','_blank');
  w.document.write(`<html><head><title>Receipt</title><style>body{font-family:system-ui;padding:32px;color:#1a2420}h2{margin:0 0 4px}table{width:100%;border-collapse:collapse;margin-top:16px}td{padding:8px;border-bottom:1px solid #eee}.k{color:#667}</style></head><body>
    <h2>${escapeHtml(biz)}</h2><div style="color:#889">${txnTypeLabel(x.type)} · ${fmtDate(x.date)}</div>
    <table><tbody>
      <tr><td class="k">${t('amount')}</td><td><b>${money(x.amount,x.currency)}</b></td></tr>
      <tr><td class="k">${t('from_acc')}</td><td>${acc?escapeHtml(acc.name):'—'}</td></tr>
      <tr><td class="k">${t('to_acc')}</td><td>${acc2?escapeHtml(acc2.name):'—'}</td></tr>
      <tr><td class="k">${t('person')}</td><td>${escapeHtml(x.person||'—')}</td></tr>
      <tr><td class="k">${t('reference')}</td><td>${escapeHtml(x.reference||'—')}</td></tr>
      <tr><td class="k">${t('description')}</td><td>${escapeHtml(x.description||x.note||'—')}</td></tr>
      <tr><td class="k">${t('status')}</td><td>${escapeHtml(x.status||'—')}</td></tr>
    </tbody></table>

    <script>window.onload=()=>{window.print()}<\/script></body></html>`);

}

/* ---------- CSV / Excel download helpers ---------- */
function downloadBlob(content, filename, mime){
  const blob = content instanceof Blob ? content : new Blob([content],{type:mime||'text/plain;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename;
  document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},400);
}
function toCSV(rows){
  return rows.map(r=>r.map(c=>{ const s=String(c==null?'':c); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(',')).join('\n');
}
function txnExportRows(){
  const head=['Date','Type','Ledger','Description','Person','Category','Amount','Currency','Fee','From','To','Method','Reference','Status'];
  const rows=active(S.transactions).sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map(x=>{
    const af=S.accounts.find(a=>a.id===x.fromAccount), at=S.accounts.find(a=>a.id===x.toAccount);
    return [x.date, txnTypeLabel(x.type), x.ledgerType||'', x.description||'', x.person||'', x.category||'',
      x.amount, x.currency, x.fee||0, af?af.name:'', at?at.name:'', x.method||'', x.reference||'', x.status||''];
  });
  return [head, ...rows];
}
function exportTxnsCSV(){ downloadBlob('\ufeff'+toCSV(txnExportRows()), 'transactions_'+todayStr()+'.csv', 'text/csv;charset=utf-8'); toast(t('saved'),'ok'); }
function exportTxnsExcel(){
  if(typeof XLSX==='undefined'){ toast('Excel library not loaded','err'); return; }
  const ws=XLSX.utils.aoa_to_sheet(txnExportRows()); const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Transactions'); XLSX.writeFile(wb,'transactions_'+todayStr()+'.xlsx'); toast(t('saved'),'ok');
}

function renderReportTable(rep){
  if(!rep.rows.length) return emptyState(t('no_data'));
  let html=`<div class="tbl-wrap"><table><thead><tr>${rep.columns.map((h,i)=>`<th class="${rep.align&&rep.align[i]==='r'?'r':''}">${escapeHtml(h)}</th>`).join('')}</tr></thead><tbody>`;
  html+=rep.rows.map(r=>`<tr>${r.map((cell,i)=>`<td class="${rep.align&&rep.align[i]==='r'?'r mono':''}">${escapeHtml(String(cell==null?'':cell))}</td>`).join('')}</tr>`).join('');
  html+='</tbody>';
  if(rep.totals) html+=`<tfoot><tr style="font-weight:700;background:var(--surface-2)">${rep.totals.map((cell,i)=>`<td class="${rep.align&&rep.align[i]==='r'?'r mono':''}">${escapeHtml(String(cell==null?'':cell))}</td>`).join('')}</tr></tfoot>`;
  html+='</table></div>';
  if(rep.note) html+=`<div class="banner info" style="margin-top:14px">${svg('info')}<div>${rep.note}</div></div>`;
  return html;
}
function buildReport(key){
  const pr=S.settings.primaryCurrency, sec=S.settings.secondaryCurrency;
  const T=active(S.transactions).filter(x=>inRange(x.date));
  const sum=(arr,f)=>r2(arr.reduce((s,x)=>s+r2(f(x)),0));
  switch(key){
    case 'daybook':{
      const rows=T.sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map(x=>{
        const af=S.accounts.find(a=>a.id===x.fromAccount), at=S.accounts.find(a=>a.id===x.toAccount);
        return [fmtDate(x.date),txnTypeLabel(x.type),x.description||x.category||'—',(af?af.name:'')||(at?at.name:'—'),money(x.amount,x.currency)];
      });
      return {columns:[t('date'),t('type'),t('description'),t('account'),t('amount')],align:['','','','','r'],rows};
    }
    case 'income_stmt':{
      const inc=T.filter(x=>x.type==='income');
      const rows=inc.map(x=>[fmtDate(x.date),x.category||'—',x.person||'—',money(x.amount,x.currency)]);
      return {columns:[t('date'),t('source'),t('person'),t('amount')],align:['','','','r'],rows,
        totals:[t('total'),'','',money(sum(inc,x=>x.amount),pr)]};
    }
    case 'expense_stmt':{
      const ex=T.filter(x=>x.type==='expense'||x.type==='business_expense');
      const rows=ex.map(x=>[fmtDate(x.date),x.category||'—',x.description||'—',money(r2(x.amount)+r2(x.fee||0),x.currency)]);
      return {columns:[t('date'),t('category'),t('description'),t('amount')],align:['','','','r'],rows,
        totals:[t('total'),'','',money(sum(ex,x=>r2(x.amount)+r2(x.fee||0)),pr)]};
    }
    case 'income_by_cat': return byCategory(T.filter(x=>x.type==='income'),pr,'income');
    case 'expense_by_cat': return byCategory(T.filter(x=>x.type==='expense'||x.type==='business_expense'),pr,'expense');
    case 'cashflow':{
      const map={};
      T.forEach(x=>{ const m=monthKey(x.date); map[m]=map[m]||{in:0,out:0};
        if(x.type==='income'){map[m].in=r2(map[m].in+r2(x.amount));}
        else if(x.type==='expense'||x.type==='business_expense'){map[m].out=r2(map[m].out+r2(x.amount)+r2(x.fee||0));} });
      const rows=Object.keys(map).sort().map(m=>[m,money(map[m].in,pr),money(map[m].out,pr),money(r2(map[m].in-map[m].out),pr)]);
      return {columns:[LANG==='bn'?'মাস':'Month',t('income'),t('expense'),t('month_savings')],align:['','r','r','r'],rows};
    }
    case 'pnl':{
      const inc=sum(T.filter(x=>x.type==='income'),x=>x.amount);
      const exp=sum(T.filter(x=>x.type==='expense'),x=>r2(x.amount)+r2(x.fee||0));
      const bizProfit=sum(active(S.businessDeals).filter(d=>inRange(d.date)),d=>dealCalc(d).realizedGross);
      const remInc=sum(active(S.personalRemittances).filter(r=>inRange(r.date)),r=>r.incentiveAmount||r.incentive||0);
      const rows=[
        [t('total_income'),money(inc,pr)],
        [LANG==='bn'?'ব্যবসা অর্জিত লাভ (BDT)':'Business realized profit (BDT)',moneyPlain(bizProfit,sec)],
        [LANG==='bn'?'রেমিট্যান্স প্রণোদনা (BDT)':'Remittance incentive (BDT)',moneyPlain(remInc,sec)],
        [t('total_expense'),money(exp,pr)],
      ];
      return {columns:[LANG==='bn'?'খাত':'Item',t('amount')],align:['','r'],rows,
        totals:[LANG==='bn'?'নিট (আয়−খরচ, প্রাথমিক মুদ্রা)':'Net (income−expense, primary)',money(r2(inc-exp),pr)],
        note: LANG==='bn'?'ব্যবসা ও রেমিট্যান্স লাভ আলাদা মুদ্রায় (BDT) দেখানো হয়েছে।':'Business and remittance profit shown in BDT separately.'};
    }
    case 'account_balances':{
      const rows=active(S.accounts).map(a=>[a.name,a.type||'—',a.currency,money(a.openingBalance||0,a.currency),money(accountBalance(a.id),a.currency)]);
      return {columns:[t('name'),t('type'),t('currency'),t('opening_balance'),t('current_balance')],align:['','','','r','r'],rows};
    }
    case 'account_ledger':{
      const accId=_rep.account||(active(S.accounts)[0]||{}).id; const acc=S.accounts.find(a=>a.id===accId);
      if(!acc) return {columns:[t('date')],rows:[]};
      let bal=r2(acc.openingBalance||0);
      const evts=[];
      active(S.transactions).filter(x=>inRange(x.date)).sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(x=>{
        txnPostings(x).forEach(p=>{ if(p.account===accId){ bal=r2(bal+p.delta); evts.push([fmtDate(x.date),txnTypeLabel(x.type),x.description||x.category||'—',p.delta>0?money(p.delta,acc.currency):'',p.delta<0?money(-p.delta,acc.currency):'',money(bal,acc.currency)]); } });
      });
      return {columns:[t('date'),t('type'),t('description'),t('incoming'),t('outgoing'),t('balance')],align:['','','','r','r','r'],rows:evts,
        note:(LANG==='bn'?'অ্যাকাউন্ট: ':'Account: ')+acc.name+' · '+(LANG==='bn'?'বর্তমান ব্যালেন্স ':'Current balance ')+money(accountBalance(accId),acc.currency)};
    }
    case 'remittance_report':{
      const R=active(S.personalRemittances).filter(x=>inRange(x.date));
      const rows=R.map(x=>[fmtDate(x.date),x.receiverName||'—',money(x.sentAmount,pr),fmtNum(x.rate,4),moneyPlain(x.baseBDT||x.base,sec),moneyPlain(x.incentiveAmount||x.incentive,sec),moneyPlain(x.finalBDT,sec)]);
      return {columns:[t('date'),t('receiver'),t('sent_amount'),t('rate'),t('total_base'),t('total_incentive'),t('total_final')],align:['','','r','r','r','r','r'],rows,
        totals:[t('total'),'',money(sum(R,x=>x.sentAmount),pr),'',moneyPlain(sum(R,x=>x.baseBDT||x.base),sec),moneyPlain(sum(R,x=>x.incentiveAmount||x.incentive),sec),moneyPlain(sum(R,x=>x.finalBDT),sec)]};
    }
    case 'incentive_report':{
      const R=active(S.personalRemittances).filter(x=>inRange(x.date));
      const rows=R.map(x=>[fmtDate(x.date),x.receiverName||'—',moneyPlain(x.baseBDT||x.base,sec),(x.incentivePct||0)+'%',moneyPlain(x.incentiveAmount||x.incentive,sec)]);
      return {columns:[t('date'),t('receiver'),t('total_base'),t('incentive_pct'),t('total_incentive')],align:['','','r','r','r'],rows,
        totals:[t('total'),'','','',moneyPlain(sum(R,x=>x.incentiveAmount||x.incentive),sec)]};
    }
    case 'loan_receivable': return loanReport('Loan Given',pr);
    case 'loan_payable': return loanReport('Loan Taken',pr);
    case 'loan_payments':{
      const P=active(S.loanPayments).filter(x=>inRange(x.date));
      const rows=P.map(p=>{const l=S.personalLoans.find(x=>x.id===p.loanId); return [fmtDate(p.date),l?l.personName:'—',l?(l.loanType==='Loan Given'?t('collect'):t('repay')):'',money(p.amount,p.currency),p.method||'—'];});
      return {columns:[t('date'),t('person'),t('type'),t('amount'),t('method')],align:['','','','r',''],rows,
        totals:[t('total'),'','',money(sum(P,x=>x.amount),pr),'']};
    }
    case 'business_deals':{
      const D=active(S.businessDeals).filter(x=>inRange(x.date));
      const rows=D.map(d=>{const cc=dealCalc(d);const cu=S.customers.find(x=>x.id===d.customerId);return [fmtDate(d.date),cu?cu.name:(d.customerName||'—'),money(cc.sar,pr),fmtNum(d.dealRate,4),money(cc.collected,pr),money(cc.outstanding,pr),d.status||'Active'];});
      return {columns:[t('date'),t('person'),t('deal_amount'),t('deal_rate'),t('sar_collected'),t('outstanding_sar'),t('status')],align:['','','r','r','r','r',''],rows,
        totals:[t('total'),'',money(sum(D,d=>dealCalc(d).sar),pr),'',money(sum(D,d=>dealCalc(d).collected),pr),money(sum(D,d=>dealCalc(d).outstanding),pr),'']};
    }
    case 'business_profit':{
      const D=active(S.businessDeals).filter(x=>inRange(x.date));
      const rows=D.map(d=>{const cc=dealCalc(d);const cu=S.customers.find(x=>x.id===d.customerId);return [fmtDate(d.date),cu?cu.name:(d.customerName||'—'),moneyPlain(cc.estGross,sec),cc.collPct+'%',moneyPlain(cc.realizedGross,sec),moneyPlain(cc.unrealized,sec)];});
      return {columns:[t('date'),t('person'),t('est_gross_profit'),t('collection_pct'),t('realized'),t('unrealized')],align:['','','r','r','r','r'],rows,
        totals:[t('total'),'',moneyPlain(sum(D,d=>dealCalc(d).estGross),sec),'',moneyPlain(sum(D,d=>dealCalc(d).realizedGross),sec),moneyPlain(sum(D,d=>dealCalc(d).unrealized),sec)]};
    }
    case 'collections':{
      const C=active(S.businessCollections).filter(x=>inRange(x.date));
      const rows=C.map(x=>{const d=S.businessDeals.find(y=>y.id===x.dealId);const cu=d&&S.customers.find(y=>y.id===d.customerId);return [fmtDate(x.date),cu?cu.name:(d?d.customerName:'—'),money(x.sarReceived,pr),x.method||'—'];});
      return {columns:[t('date'),t('person'),t('sar_collected'),t('method')],align:['','','r',''],rows,
        totals:[t('total'),'',money(sum(C,x=>x.sarReceived),pr),'']};
    }
    case 'receivable_aging':{
      const today=new Date(todayStr()); const buckets={'0-7':0,'8-15':0,'16-30':0,'30+':0};
      active(S.businessDeals).forEach(d=>{const cc=dealCalc(d); if(cc.outstanding<=0.001)return; const due=d.dueDate?new Date(d.dueDate):new Date(d.date); const days=Math.floor((today-due)/86400000);
        const b=days<=7?'0-7':days<=15?'8-15':days<=30?'16-30':'30+'; buckets[b]=r2(buckets[b]+cc.outstanding);});
      const rows=Object.keys(buckets).map(b=>[b+(LANG==='bn'?' দিন':' days'),money(buckets[b],pr)]);
      return {columns:[LANG==='bn'?'বয়স':'Age',t('outstanding_sar')],align:['','r'],rows,
        totals:[t('total'),money(r2(Object.values(buckets).reduce((s,v)=>s+v,0)),pr)]};
    }
    case 'customer_ledger':{
      const cid=_rep.customer||(active(S.customers)[0]||{}).id; const cu=S.customers.find(x=>x.id===cid);
      if(!cu) return {columns:[t('date')],rows:[]};
      const evts=[];
      active(S.businessDeals).filter(d=>d.customerId===cid&&inRange(d.date)).forEach(d=>{const cc=dealCalc(d);evts.push([d.date,fmtDate(d.date),t('deal'),money(cc.sar,pr),'']);});
      active(S.businessCollections).filter(x=>x.customerId===cid&&inRange(x.date)).forEach(x=>evts.push([x.date,fmtDate(x.date),t('collection'),'',money(x.sarReceived,pr)]));
      evts.sort((a,b)=>(a[0]||'').localeCompare(b[0]||''));
      const a=customerAgg(cid);
      return {columns:[t('date'),t('type'),t('deal_amount'),t('sar_collected')],align:['','','r','r'],rows:evts.map(e=>e.slice(1)),
        note:(LANG==='bn'?'কাস্টমার: ':'Customer: ')+cu.name+' · '+t('outstanding_sar')+': '+money(a.outstanding,pr)};
    }
    case 'customer_summary':{
      const rows=active(S.customers).map(cu=>{const a=customerAgg(cu.id);return [cu.name,money(a.totalSAR,pr),money(a.collected,pr),money(a.outstanding,pr),moneyPlain(a.realized,sec)];});
      return {columns:[t('name'),t('sar_deal'),t('sar_collected'),t('outstanding_sar'),t('realized')],align:['','r','r','r','r'],rows};
    }
    case 'audit_log':{
      const rows=S.auditLogs.filter(x=>inRange(x.actionDate)).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')).slice(0,500).map(x=>[fmtDate(x.actionDate),x.actionTime||'',x.recordType,x.action]);
      return {columns:[t('date'),LANG==='bn'?'সময়':'Time',LANG==='bn'?'ধরন':'Record',LANG==='bn'?'কাজ':'Action'],align:['','','',''],rows};
    }
  }
  return {columns:[t('no_data')],rows:[]};
}
function byCategory(arr,pr,kind){
  const map={}; arr.forEach(x=>{const c=x.category||'—'; map[c]=r2((map[c]||0)+r2(x.amount)+r2(x.fee||0));});
  const total=r2(Object.values(map).reduce((s,v)=>s+v,0));
  const rows=Object.keys(map).sort((a,b)=>map[b]-map[a]).map(c=>[c,money(map[c],pr),(total>0?r2(map[c]/total*100):0)+'%']);
  return {columns:[t('category'),t('amount'),'%'],align:['','r','r'],rows,totals:[t('total'),money(total,pr),'100%']};
}
function loanReport(loanType,pr){
  const L=active(S.personalLoans).filter(l=>l.loanType===loanType);
  const rows=L.map(l=>{const tt=loanTotals(l);return [fmtDate(l.date),l.personName,money(tt.total,l.currency),money(tt.paid,l.currency),money(tt.remaining,l.currency),l.status||'Active'];});
  const sum=f=>money(r2(L.reduce((s,l)=>s+f(loanTotals(l)),0)),pr);
  return {columns:[t('date'),t('person'),t('total_payable'),t('paid'),t('remaining'),t('status')],align:['','','r','r','r',''],rows,
    totals:[t('total'),'',sum(x=>x.total),sum(x=>x.paid),sum(x=>x.remaining),'']};
}

function reportAOA(){ const r=currentReport(); const aoa=[r.columns, ...r.rows]; if(r.totals)aoa.push(r.totals); return aoa; }
function exportReportCSV(){ downloadBlob('\ufeff'+toCSV(reportAOA()), _rep.key+'_'+todayStr()+'.csv','text/csv;charset=utf-8'); toast(t('saved'),'ok'); }
function exportReportExcel(){ if(typeof XLSX==='undefined'){toast('Excel lib missing','err');return;} const ws=XLSX.utils.aoa_to_sheet(reportAOA());const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Report');XLSX.writeFile(wb,_rep.key+'_'+todayStr()+'.xlsx');toast(t('saved'),'ok'); }
function printReport(){
  const rep=currentReport(); const cur=REPORTS.find(r=>r.key===_rep.key);
  const w=window.open('','_blank');
  w.document.write(`<html><head><title>${repName(cur)}</title><style>body{font-family:system-ui;padding:28px;color:#1a2420}h2{margin:0}table{width:100%;border-collapse:collapse;margin-top:14px;font-size:13px}th,td{padding:7px 9px;border-bottom:1px solid #e5e5e5;text-align:left}th{background:#f4f4f2;text-transform:uppercase;font-size:11px}tfoot td{font-weight:700;border-top:2px solid #999}</style></head><body>
    <h2>${escapeHtml(S.settings.businessName||'')}</h2><div style="color:#889">${repName(cur)} · ${_rep.from||'…'} → ${_rep.to||'…'}</div>
    <table><thead><tr>${rep.columns.map(h=>`<th>${escapeHtml(h)}</th>`).join('')}</tr></thead>
    <tbody>${rep.rows.map(r=>`<tr>${r.map(c=>`<td>${escapeHtml(String(c==null?'':c))}</td>`).join('')}</tr>`).join('')}</tbody>
    ${rep.totals?`<tfoot><tr>${rep.totals.map(c=>`<td>${escapeHtml(String(c==null?'':c))}</td>`).join('')}</tr></tfoot>`:''}</table>
    <p style="margin-top:20px;color:#aab;font-size:11px">${new Date().toLocaleString()}</p>
    <script>window.onload=()=>window.print()<\/script></body></html>`);
  w.document.close();
}
function exportReportPDF(){
  if(!window.jspdf||!window.jspdf.jsPDF){ printReport(); return; }
  const { jsPDF }=window.jspdf; const doc=new jsPDF(); const rep=currentReport(); const cur=REPORTS.find(r=>r.key===_rep.key);
  doc.setFontSize(14); doc.text(String(S.settings.businessName||'Report'),14,16);
  doc.setFontSize(10); doc.setTextColor(120); doc.text(repName(cur)+'  '+(_rep.from||'')+' - '+(_rep.to||''),14,23);
  let y=32; doc.setTextColor(20); doc.setFontSize(8);
  const colW=182/rep.columns.length;
  doc.setFont(undefined,'bold'); rep.columns.forEach((h,i)=>doc.text(String(h).slice(0,18),14+i*colW,y)); doc.setFont(undefined,'normal');
  y+=5; doc.setDrawColor(200); doc.line(14,y-3,196,y-3);
  rep.rows.slice(0,120).forEach(r=>{ if(y>280){doc.addPage();y=20;} r.forEach((c,i)=>doc.text(String(c==null?'':c).slice(0,18),14+i*colW,y)); y+=5; });
  if(rep.totals){ doc.setFont(undefined,'bold'); if(y>280){doc.addPage();y=20;} rep.totals.forEach((c,i)=>doc.text(String(c==null?'':c).slice(0,18),14+i*colW,y)); }
  doc.save(_rep.key+'_'+todayStr()+'.pdf'); toast(t('saved'),'ok');
}

function downloadBackup(){
  downloadBlob(JSON.stringify(buildBackupObject(),null,2),'finance_backup_'+todayStr()+'.json','application/json');
  S.settings.lastBackup=nowISO(); save('settings',S.settings);
  toast(t('saved'),'ok'); if(CUR==='backup')render();
}
async function snapshotBackup(){
  const obj=buildBackupObject(); const count=BACKUP_STORES.filter(k=>k!=='settings').reduce((s,k)=>s+(S[k]||[]).length,0);
  const snap={id:uid('snap'),createdAt:nowISO(),count,payload:JSON.stringify(obj)};
  await dbPut('backupSnapshots',snap);
  const all=(await dbGetAll('backupSnapshots')).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  for(let i=5;i<all.length;i++) await dbDelete('backupSnapshots',all[i].id);
  S.settings.lastBackup=nowISO(); await save('settings',S.settings);
  toast(LANG==='bn'?'স্ন্যাপশট সংরক্ষিত':'Snapshot saved','ok'); render();
}
async function downloadSnapshot(id){ const s=(await dbGetAll('backupSnapshots')).find(x=>x.id===id); if(s)downloadBlob(s.payload,'snapshot_'+s.createdAt.slice(0,10)+'.json','application/json'); }
async function restoreSnapshot(id){ const s=(await dbGetAll('backupSnapshots')).find(x=>x.id===id); if(!s)return; await applyBackup(JSON.parse(s.payload),'replace'); }
function importBackup(mode){
  const f=document.getElementById('bkFile').files[0];
  if(!f){ toast(LANG==='bn'?'ফাইল নির্বাচন করুন':'Select a file','err'); return; }
  const rd=new FileReader();
  rd.onload=async()=>{ try{ const obj=JSON.parse(rd.result);
      if(!obj.data||typeof obj.data!=='object'){ toast(LANG==='bn'?'অবৈধ ব্যাকআপ ফাইল':'Invalid backup file','err'); return; }
      await applyBackup(obj,mode);
    }catch(e){ toast(LANG==='bn'?'ফাইল পড়া যায়নি':'Could not read file','err'); } };
  rd.readAsText(f);
}
async function applyBackup(obj,mode){
  try{
    for(const k of BACKUP_STORES){
      const incoming=obj.data[k]||[];
      if(k==='settings'){ if(incoming[0]){ S.settings={...S.settings,...incoming[0],id:'app'}; await dbPut('settings',S.settings);} continue; }
      if(mode==='replace'){ await dbClear(k); S[k]=[]; }
      const map={}; (S[k]||[]).forEach(r=>map[r.id]=r);
      incoming.forEach(r=>{ if(r&&r.id) map[r.id]=r; });
      S[k]=Object.values(map);
      for(const r of incoming){ if(r&&r.id) await dbPut(k,r); }
    }
    LANG=S.settings.language||LANG; applyTheme(); applyLang(); renderNav(); render();
    toast(LANG==='bn'?'পুনরুদ্ধার সম্পন্ন':'Restore complete','ok');
  }catch(e){ console.error(e); toast('Error: '+e.message,'err'); }
}

/* ============================================================
   SEED DEFAULTS + INIT
   ============================================================ */
async function seedDefaults(){
  if(S.currencies.length===0){ for(const c of CURRENCIES){ const rec={id:c.code,...c}; S.currencies.push(rec); await dbPut('currencies',rec); } }
  if(S.incomeCategories.length===0){ for(const n of DEFAULT_INCOME_CATS){ const rec={id:uid('cat'),name:n,...meta()}; S.incomeCategories.push(rec); await dbPut('incomeCategories',rec); } }
  if(S.expenseCategories.length===0){ for(const n of DEFAULT_EXPENSE_CATS){ const rec={id:uid('cat'),name:n,...meta()}; S.expenseCategories.push(rec); await dbPut('expenseCategories',rec); } }
  if(!S.settings.id) S.settings=defaultSettings();
  await dbPut('settings',S.settings);
}
async function init(){
  try{
    await openDB();
    await loadAll();
    await seedDefaults();
    LANG = S.settings.language || 'bn';
    applyTheme();
    applyLang();
    renderNav();
    render();
    if(!isSeeded()){ firstRunPrompt(); }
  }catch(err){
    console.error('Init failed', err);
    document.getElementById('content').innerHTML = `<div class="empty"><p>⚠️ ${LANG==='bn'?'অ্যাপ চালু করা যায়নি':'Failed to start app'}: ${escapeHtml(err.message)}</p><p style="margin-top:8px;font-size:12px">${LANG==='bn'?'আপনার ব্রাউজার IndexedDB সমর্থন করে কিনা দেখুন (প্রাইভেট মোডে সমস্যা হতে পারে)।':'Check that your browser supports IndexedDB (private mode may block it).'}</p></div>`;
  }
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init); else init();
